cr:
    id: 108
    uid: cr_f03377d2-74a6-4e0f-badb-d13c56b5fe0e
    title: Patch schema v2 with richer collaboration ops
    description: Introduce patch schema v2 with expanded op support (task/note deletes, task reorder, richer set_field coverage, and structured conflict resolution payloads) while preserving backward compatibility for v1 patch consumers.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 4b9fd65799d4f6ad50d5d6345aed8261a58cc2d0
    branch: cr-patch-schema-v2-with-richer-collaboration-ops-f033
    merged_at: "2026-03-03T02:44:03Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: Enable patch schema v2 so collaboration edits can express structural intent such as deletes and reordering without manual metadata surgery. Keep preview and apply deterministic, conflict explicit, and fully backward compatible with v1 patch payloads. Done means supported v2 operations are machine validated, conflicts are reproducible, and existing v1 consumers remain stable.
    scope:
        - docs/cli-reference.md
        - docs/collaboration.md
        - internal/cli
        - internal/cli/cr_cmd_import_patch.go
        - internal/model
        - internal/service/collab
        - internal/service/service_collab.go
        - internal/service/service_collab_test.go
        - internal/service/service_hq_sync.go
        - internal/service/service_hq_test.go
    non_goals:
        - No HQ server protocol redesign in this CR.
        - No removal of v1 patch support.
        - No silent conflict auto-resolution.
        - No unrelated refactors outside collaboration surfaces.
    invariants:
        - Existing v1 patch payloads remain accepted with unchanged semantics.
        - Patch apply performs no partial writes when conflicts are present.
        - Preview and apply classify conflicts identically for the same payload and base state.
        - Unknown ops and unsupported fields fail with deterministic structured errors.
    blast_radius: Collaboration patch schema and apply pipeline, HQ patch synthesis, CLI import/preview surfaces, JSON error envelopes, and docs. Failure modes include incorrect conflict detection, accidental metadata mutation, and HQ sync divergence.
    risk_critical_scopes:
        - internal/service/service_collab.go
        - internal/service/service_hq_sync.go
    risk_tier_hint: high
    risk_rationale: Touches core patch apply semantics and HQ synchronization behavior where incorrect merges can corrupt collaboration metadata.
    test_plan: go test ./internal/service -run 'Patch|Collab|HQ' -count=1 && go test ./internal/cli -run 'Patch|Collab' -count=1 && go test ./... -count=1 && go vet ./...
    rollback_plan: Revert the [CR-108] merge commit and continue emitting v1-only collaboration patches until v2 issues are resolved.
