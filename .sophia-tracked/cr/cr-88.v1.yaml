      status: done
      contract:
        intent: Persist checkpoint sync ledger and enforce strict checkpoint-only sync ordering for PR timelines.
        acceptance_criteria:
            - PR sync fails when pushing a checkpoint would include earlier non-checkpoint commits.
            - Pre-pushed checkpoint commits are marked synced without retroactive comments.
            - Unsynced checkpoints are tracked via checkpoint_sync_keys separate from checkpoint_comment_keys.
        scope:
