      status: done
      contract:
        intent: Implement strict checkpoint ordering and reachable-commit collection for existing PR sync.
        acceptance_criteria:
            - Checkpoint sync processes unsynced task checkpoints in reachable branch order.
            - Pre-pushed checkpoints are marked synced without retroactive comments.
            - Sync fails when non-checkpoint commits appear before a checkpoint target in missing commit sequence.
        scope:
