    - id: 1
      title: Design checkpoint sync timeline comment format (task header + commit list)
      status: done
      contract:
        intent: Define marker-only checkpoint timeline comment shape aligned with GitHub commit ladder semantics.
        acceptance_criteria:
            - Checkpoint marker comments are concise and deterministic.
            - Comment text does not embed commit bullet lists.
            - Design aligns with PR body as intent source and timeline as commit source.
        scope:
            - internal/service
