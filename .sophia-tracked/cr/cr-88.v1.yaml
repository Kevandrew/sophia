contract:
    why: Make checkpoint sync timeline updates reviewer-friendly by emitting a structured sync comment that includes the exact commits for that sync event.
    scope:
        - internal/cli
        - internal/model
        - internal/service
        - internal/store
    non_goals:
        - Change merge gate policy semantics
        - Rewrite historical PR comments
    invariants:
        - Checkpoint sync comments must reference only current, reachable commits for the PR head state.
        - No local CR numeric IDs or raw UIDs appear in PR-facing text.
        - PR body remains the source of intent/contract details.
    blast_radius: PR sync comment formatting and ledger behavior for checkpoint updates on GitHub PR timelines.
    risk_tier_hint: medium
    risk_rationale: Touches reviewer-facing output and sync idempotency around PR timeline comments.
    test_plan: go test ./internal/service/... && go test ./internal/cli/... && manual dry-run against an open PR with rebase/force-push scenario
    rollback_plan: Revert CR-88 commits; existing PR comments remain as posted but future syncs return to prior behavior.
