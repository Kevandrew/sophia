    uid: cr_8e4f27a7-8c79-4582-b924-6b318f1bbd4e
    title: Decompose remaining service.go type surfaces into ownership-local files
    description: Continue CR-81 by heavily decomposing residual type/view declarations from service.go into ownership-local modules, while preserving behavior and JSON contracts.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 20dddddc350f65f55dbd9254aaba6a383bea230a
    branch: cr-decompose-remaining-service-go-type-surfaces-int-8e4f
    merged_at: "2026-02-28T13:26:02Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        service.go remains a dense aggregation point for many non-core view/diff/history/export/blame/pack type declarations, which makes navigation and ownership boundaries unclear even after CR-81.

        This CR decomposes the remaining non-core type surfaces out of service.go into ownership-local type files grouped by behavior domains (status, diff/rangediff, blame, history/export/pack, and merge/doctor views). The goal is to make service.go a composition/runtime seam file rather than a monolithic type registry.

        Decision boundary: this CR performs mechanical type relocation and reference rewiring only. It does not change command semantics, JSON key names, business logic, trust scoring rules, or merge gating policy.

        Success is measured by materially shrinking service.go, preserving compile/runtime behavior, and keeping all JSON/read surfaces stable under existing test suites and validation/review checks.
    scope:
        - internal/cli
        - internal/service
    non_goals:
        - No algorithmic changes to review/validate/trust/merge behavior.
        - No new CLI flags, commands, or JSON envelope keys.
        - No policy or metadata schema migration work.
        - No unrelated refactors outside service type ownership decomposition.
    invariants:
        - All exported fields and JSON key mappings remain backward compatible.
        - CR-81 branch remains the immediate parent and integration base.
        - Service methods and public method signatures remain unchanged.
        - Type moves remain mechanical ownership changes with no semantic drift.
    blast_radius: Affects service-layer type ownership and compile-time declarations across status/diff/pack/history/blame/review surfaces; related CLI JSON mappers and tests may be touched only to preserve existing output contracts. Primary failure modes are accidental field/schema drift, reference breakage, or scope/contract drift during large-file decomposition.
    risk_critical_scopes:
        - internal/cli
        - internal/service
    risk_tier_hint: high
    risk_rationale: High-surface structural decomposition across many shared type declarations can cause silent contract drift if not guarded by tests.
    test_plan: go test ./internal/service/... && go test ./internal/cli/... && go test ./... && go vet ./...
    rollback_plan: Revert the CR-85 merge commit to restore prior type placement if any regression appears.
