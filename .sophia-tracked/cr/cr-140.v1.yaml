    title: Fix stacked child merges landing on main instead of parent branch
    description: E2E repro shows stacked child CR merges resolve parent task metadata but land directly on main, deleting or bypassing the parent integration branch and making the parent merge fail with an ambiguous branch error.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 080a54c8c4ffb21aa33b87b69b588a42aba9017b
    branch: cr-fix-stacked-child-merges-landing-on-main-instead-62ca
    merged_at: "2026-03-05T23:30:23Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: A stacked local workflow should merge child CRs into the parent integration branch, not directly into main. The current behavior resolves delegated parent tasks but leaves the parent branch ref missing, which breaks the final parent merge and invalidates the intended parent->child->parent->main model.
    scope:
        - docs/workflow.md
        - internal/cli
        - internal/service
        - skills/sophia/SKILL.md
    non_goals:
        - No changes to PR-gated remote stack behavior unless the same root cause affects it.
        - No unrelated refactors to stack nativity UI.
    invariants:
        - Child CR merges in a stacked local workflow must preserve the parent branch as the integration branch.
        - Delegated parent task auto-resolution must continue to work after child merges.
    blast_radius: Touches local merge target resolution, stack branch lifecycle, and stacked workflow regression coverage. Failure modes are child merges landing on main, parent refs disappearing, or delegated-parent repair regressing.
    risk_tier_hint: high
    risk_rationale: This breaks the core stacked workflow and can silently rewrite the merge topology in local mode.
    test_plan: Reproduce the temp-repo stacked flow end to end and verify child merges land on the parent branch, parent branch ref survives, and the parent merge succeeds.
    rollback_plan: Revert the CR and restore previous merge target logic if the fix regresses non-stacked merges.
