contract:
    why: The service currently exposes multiple AddCR wrappers that mostly reshape the same result. This duplicates logic and obscures the true add entrypoint. This CR reduces wrapper noise while preserving exported signatures and behavior, making add flow easier to follow and maintain.
    scope:
        - internal/service/service_cr.go
        - internal/service/service_cr_add_switch_test.go
        - internal/service/service_public_contract_test.go
        - internal/service/service_test.go
    non_goals:
        - Do not change add persistence, branching, or bootstrap behavior.
        - Do not remove exported service methods used by existing callers.
    invariants:
        - AddCR, AddCRWithWarnings, AddCRWithOptionsWithWarnings, and AddCRWithOptions keep existing signatures.
        - Warning payload content remains unchanged for callers.
    blast_radius: Service add method wrappers and compile-time signature guards, with potential touchpoints in non-test callers.
    risk_tier_hint: low
    risk_rationale: Primarily structural simplification with strict compatibility constraints.
    test_plan: go test ./internal/service ./internal/cli
    rollback_plan: Revert the merge commit for this CR to restore prior wrapper layout.
