    title: Collapse AddCR service wrapper fan-out
    description: Reduce AddCR wrapper surface by centralizing result shaping and warning copy behavior in one adapter path.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 0fb76e972118b1e855c4cf397141ac8ec0fcec1f
