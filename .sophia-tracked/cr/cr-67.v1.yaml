    uid: cr_4a06a382-4d6c-49f7-886d-6abf01a0541f
    title: 'Tech debt: split large service/cli files into capability directories (scoping-first)'
    description: Tracking CR to refactor monolithic internal/service and internal/cli files into per-capability directories so CR/task scopes can cleanly target dir prefixes (internal/service/cr/, internal/service/trust/, internal/cli/cr/, internal/cli/json/).
    status: merged
    base_branch: main
    base_ref: main
    base_commit: fafbe2ff0c787481f7cac078f1b50f20e499cbfa
    branch: cr-tech-debt-split-large-service-cli-files-into-cap-4a06
    merged_at: "2026-02-25T10:25:55Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: Large files in internal/service and internal/cli increase merge conflicts and make scoped task ownership hard. Refactor into capability-oriented directories so contracts can scope to narrow dir prefixes like internal/service/cr/, internal/service/trust/, internal/cli/cr/, and internal/cli/json/.
    scope:
        - docs
        - internal/cli
        - internal/service
    non_goals:
        - No behavior changes; refactor-only.
        - No renaming of user-facing commands/flags/output.
    invariants:
        - All existing tests must pass; refactor must be semantics-preserving.
        - Directory structure is capability-based (cr/, diff/, trust/, policy/, merge/, tasks/, collab/, json/), not milestone-based.
    blast_radius: Internal wiring/layout only; primary risk is refactor regression.
    risk_tier_hint: medium
    risk_rationale: Touches core command/service code paths even with intended no behavior change.
    test_plan: go test ./... && go vet ./...
    rollback_plan: Revert the merge commit.
