cr:
    id: 68
    uid: cr_da12a67a-5b9f-4193-8dc3-b48bf4f6e7a8
    title: 'Tech debt: reduce god files and decouple service/CLI core for mockable task runtime'
    description: 'Large core files and mixed service/infra orchestration are raising maintenance cost and regression risk. This CR broadens from task-only cleanup to a larger technical-debt slice: split god files in service and CLI core, normalize task lifecycle abstractions, centralize checkpoint state mutations, and introduce narrow runtime seams so follow-up CRs can implement fast mocked tests without changing user-facing behavior.'
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 9094baae68c285751094bc11949bd0e593755554
    branch: cr-tech-debt-task-service-boundary-cleanup-and-prov-da12
    merged_at: "2026-02-25T12:54:10Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: Current task workflows mix domain transitions, git execution, and persistence in large service methods, which increases regression risk and slows testing. This CR isolates lifecycle logic behind focused helpers and provider seams without changing CLI behavior.
    scope:
        - internal/cli
        - internal/gitx
        - internal/model
        - internal/service
        - internal/service/service.go
        - internal/service/service_cr.go
        - internal/service/service_tasks.go
        - internal/service/tasks
        - internal/store
    non_goals:
        - No CR/task metadata format breaking change.
        - No trust-policy redesign.
        - No user-facing command or flag behavior changes.
    invariants:
        - Checkpoint metadata remains backward compatible.
        - Merge/review guardrails remain behaviorally equivalent.
        - Task status semantics remain compatible (open/done/delegated).
    blast_radius: 'Service and CLI core refactor surface: task completion/reopen internals, checkpoint state transitions, CR service decomposition, and CR command wiring splits without user-facing semantic changes.'
    risk_critical_scopes:
        - internal/service
    risk_tier_hint: medium
    risk_rationale: Core task lifecycle path is being refactored.
    test_plan: go test ./internal/service ./internal/model && go test ./... && go vet ./...
    rollback_plan: Revert the CR-68 merge commit.
