contract:
    why: Reduce noisy scope-drift UX by making post-checkpoint CR scope updates deterministic while preserving explicit manual drift acknowledgment.
    scope:
        - docs
        - internal/cli
        - internal/service
        - internal/store
    non_goals:
        - Do not auto-acknowledge CR contract drift records.
        - Do not remove CR drift records from audit history.
    invariants:
        - Manual cr contract drift ack remains required before merge when CR drift is recorded.
        - Post-freeze scope updates still require --change-reason.
    blast_radius: CR contract set/list UX, validation scope-source selection, and docs for post-checkpoint scope updates.
    test_plan: go test ./internal/service -run 'ContractDrift|ValidateCR|ScopeDrift' -count=1 && go test ./internal/cli -run 'CRContractDrift|contract set' -count=1 && go test ./... -count=1 && go vet ./...
    rollback_plan: Revert the CR-89 merge commit to restore prior scope-source and contract-drift UX behavior.
