cr:
    id: 93
    uid: cr_95e59fe9-8fea-44eb-9ce7-c632c54f9f2e
    title: Enforce draft-only pre-implementation PR deployment
    description: Prevent accidental ready-for-review transitions when publishing implementation-incomplete CRs by adding explicit readiness guards and workflow guidance.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: d5299183ed4eeabc93cf19e2a942c6e1f2f01602
    branch: cr-enforce-draft-only-pre-implementation-pr-deploym-95e5
    merged_at: "2026-03-04T23:28:57Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: Publishing a PR early is useful for visibility, but an implementation-incomplete CR should remain draft unless an explicit readiness decision is made. The current agent workflow can accidentally promote a pre-implementation PR to ready-for-review, which misleads reviewers and can trigger branch-protection expectations before work exists. This CR introduces explicit readiness guards so pre-implementation publication stays draft-first by default and ready transitions are intentional and auditable.
    scope:
        - docs/repository-policy.md
        - docs/troubleshooting.md
        - docs/workflow.md
        - internal/cli
        - internal/service
    non_goals:
        - Do not change merge gate policy (approvals/checks) semantics in this CR.
        - Do not modify release/tag workflows.
        - Do not redesign checkpoint comment content in this CR.
    invariants:
        - Existing local merge mode behavior remains unchanged.
        - Ready-for-review transition remains explicit and returns structured blocked guidance when readiness preconditions are not met.
        - sophia cr merge <id> in pr_gate mode only opens/syncs draft PR state unless user explicitly requests ready transition.
    blast_radius: PR publication lifecycle behavior, CLI UX for pr ready/merge flow, and reviewer expectations for draft vs ready state in PR-gated repositories.
    risk_tier_hint: medium
    risk_rationale: Touches merge/publish lifecycle semantics and user-facing PR state transitions in PR-gated mode.
    test_plan: go test ./internal/service/... -count=1 && go test ./internal/cli/... -count=1 && go test ./... -count=1 && go vet ./...
    rollback_plan: Revert CR-93 merge commit to restore prior PR readiness behavior.
tasks:
