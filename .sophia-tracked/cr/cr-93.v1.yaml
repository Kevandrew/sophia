      title: Define and enforce pre-implementation readiness guard in PR-gate service flow
      status: done
      contract:
        intent: Prevent readiness promotion for pre-implementation CRs by adding a deterministic readiness predicate in PR-gate service operations.
        acceptance_criteria:
            - Draft/open publish path remains available for visibility and does not require ready transition.
            - Guard evaluation is deterministic and idempotent across repeated status/ready calls.
            - Ready transition is blocked when CR has no completed implementation tasks (or equivalent pre-implementation state), with a structured reason code.
        scope:
