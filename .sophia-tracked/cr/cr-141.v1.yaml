cr:
    id: 141
    uid: cr_77751478-9d28-4400-9336-9509febdb0c7
    title: Shell-first cr show rendering with skeletons and lazy-loaded data
    description: Make cr show feel immediate by serving a lightweight HTML shell first, rendering skeleton states for dashboard/CR surfaces, and loading heavier snapshot sections lazily instead of embedding a large first-paint payload.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 2ffa9f4fffea473261caf328dff285877d506e5e
    branch: cr-shell-first-cr-show-rendering-with-skeletons-and-7775
    merged_at: "2026-03-05T23:58:25Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: Make `sophia cr show` feel immediate by serving a lightweight HTML shell first, then hydrating dashboard and per-CR surfaces with async snapshot fetches. The current embedded-payload approach is simple but makes the first paint path do too much work at once and ties perceived latency to full snapshot generation plus browser parse/render of a large inline JSON blob. Shell-first rendering should preserve the localhost-preview model while making the UX feel responsive and giving us a cleaner foundation for dashboard-first usage.
    scope:
        - internal/cli
        - internal/cli/templates
        - internal/service
    non_goals:
        - No change to CR/domain semantics or delegation behavior.
        - No full SPA/router rewrite in this CR.
    invariants:
        - Per-CR and dashboard views must remain functionally equivalent to current data surfaces once hydration completes.
        - The localhost preview must continue to work without external services or build tooling.
    blast_radius: Touches cr show server routes, HTML bootstrap payload shape, browser hydration logic, and dashboard/per-CR first-paint behavior. Failure modes are blank pages, missing sections after hydration, stale selected-CR state, or broken live-refresh wiring.
    risk_tier_hint: medium
    risk_rationale: Primarily frontend/preview UX work, but it changes the bootstrap and hydration path for cr show and dashboard mode.
    test_plan: go test ./internal/cli ./internal/service && manually verify `sophia cr show` and `sophia cr show <id>` first paint, hydration, dashboard navigation, and lazy timeline loading.
    rollback_plan: Revert the CR to restore embedded full-payload rendering.
