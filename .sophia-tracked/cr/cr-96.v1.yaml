cr:
    id: 96
    uid: cr_98aeca89-a607-4100-96dc-6037b2a2e92f
    title: Shift lifecycle orchestration tests to fakeLifecycleGit
    description: |-
        Reduce service test runtime by migrating lifecycle-orchestration unit tests away from per-test real Git setup and onto the existing runtime harness (`fakeLifecycleGit`, `fakeCRStore`).

        This CR is intentionally scoped to lifecycle behavior (AddCR/SetCRBase/Restack/Refresh and related state transitions). It does not replace integration tests that validate real git semantics (merge conflict flows, worktree ownership, refs wiring, blame/patch behavior).

        Baseline before this CR (2026-03-01): internal/service package ~97s (`go test ./internal/service -count=1`) with 432 `runGit(...)` invocations across 36 files.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: f5f56f63e9cd2c8cd0c6eb69462b1cd574aad1e3
    branch: cr-shift-lifecycle-orchestration-tests-to-fakelifec-98ae
    merged_at: "2026-03-01T11:58:01Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        The repository already provides mature runtime fakes and a reusable harness, but many lifecycle tests still shell out to `git` repeatedly, creating avoidable cost and setup noise. These tests mostly validate service decision logic and metadata transitions, not git plumbing fidelity.

        By moving those tests to `fakeLifecycleGit`, we can keep assertions precise, make failure causes clearer, and materially reduce test runtime. Faster lifecycle tests also improve confidence in future refactors by making the feedback loop short enough to run repeatedly.

        Decision boundary: convert lifecycle-orchestration tests that only need lifecycle runtime signals; keep real-git integration coverage where command-level semantics are the behavior under test.
    scope:
        - internal/service
        - internal/service/service_refresh_test.go
        - internal/service/service_runtime_fakes_test.go
        - internal/service/service_runtime_harness_test.go
        - internal/service/service_test.go
    non_goals:
        - No global shared mutable git fixture across tests.
        - No production service/CLI behavior changes.
        - No replacement of merge/worktree/ref integration suites that depend on real git command behavior.
    invariants:
        - Lifecycle unit tests remain deterministic and isolated with no dependence on host git state.
        - Real-git integration coverage for merge/worktree/ref semantics remains present and passing.
        - Runtime-provider seams remain optional test overrides; production wiring is unchanged.
    blast_radius: |-
        Test-only changes in internal/service lifecycle suites and runtime test harness helpers.
        Failure modes: accidental over-mocking that hides integration regressions, or fake behavior drift from real lifecycle contracts.
        Mitigation: preserve explicit real-git integration tests and add focused assertions for fake call expectations and state transitions.
    risk_tier_hint: low
    risk_rationale: Test-only refactor with existing fake infrastructure; no runtime production path mutation.
    test_plan: go test ./internal/service -count=1 && go test ./internal/service -run 'Test(AddCR|Refresh|SetCRBase|Restack)' -count=3 && go test ./... -count=1
    rollback_plan: Revert the CR merge commit to restore prior real-git lifecycle tests.
