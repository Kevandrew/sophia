contract:
    why: Enable zero-friction Sophia adoption in third-party repos by allowing mutating CR entrypoints to lazily bootstrap local metadata without explicit init. Preserve existing initialized-repo behavior and keep maintainer-facing workflows unchanged.
    scope:
        - docs/cli-reference.md
        - docs/getting-started.md
        - docs/workflow.md
        - internal/cli/cr_cmd_core.go
        - internal/cli/cr_json_branch_ops_test.go
        - internal/cli/cr_json_mappers.go
        - internal/cli/cr_json_test.go
        - internal/cli/help_output_test.go
        - internal/cli/root.go
        - internal/service/service.go
        - internal/service/service_cr.go
        - internal/service/service_metadata_root.go
        - internal/service/service_test.go
    non_goals:
        - Do not auto-create tracked SOPHIA.yaml in lazy bootstrap path.
        - Do not change explicit sophia init behavior.
    invariants:
        - AddCR in initialized repos remains behavior-compatible.
        - Lazy bootstrap defaults to local metadata mode.
    blast_radius: CR add mutation preflight, base-branch inference defaults, CLI/JSON output surfaces, and first-run docs.
    risk_critical_scopes:
        - internal/service/service.go
        - internal/service/service_cr.go
    risk_tier_hint: high
    risk_rationale: Touches foundational mutation path used by authors in all repos.
    test_plan: go test ./internal/service ./internal/cli ./internal/store ./internal/model && go test ./...
    rollback_plan: Revert the CR merge commit.
