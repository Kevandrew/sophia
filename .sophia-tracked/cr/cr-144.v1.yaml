    scope:
        - internal/cli
        - internal/cli/templates
    non_goals:
        - No cr list redesign in this child CR.
        - No removal of delegated-task audit details.
    invariants:
        - Aggregate parents show child CRs as primary work while keeping delegated-task links inspectable.
        - Non-aggregate cr show pages continue to use the current task-oriented structure.
    blast_radius: Touches per-CR payload rendering and aggregate-parent section layout. Failure modes are missing child navigation, duplicated task/child information, or degraded readability on mobile.
    risk_tier_hint: medium
    risk_rationale: Changes the primary composition of aggregate-parent cr show pages.
    test_plan: go test ./internal/cli
    rollback_plan: Revert this child CR to restore the current aggregate-parent cr show presentation.
