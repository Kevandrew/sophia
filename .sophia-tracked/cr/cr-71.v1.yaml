cr:
    id: 71
    uid: cr_70fd3699-6164-4529-90b1-45ffcfedf3eb
    title: 'Test infra: migrate service suites to fake runtime harness and minimize temp-repo git flows'
    description: Replace integration-first service tests with harnessed fake runtime tests wherever behavior does not require real git semantics. Keep a small explicit integration tier for real repository/worktree behavior.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: f63ebf07b1019c5568b6e2463f346b0dd13a49fa
    branch: cr-test-infra-migrate-service-suites-to-fake-runtim-70fd
    merged_at: "2026-02-25T16:02:54Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: Service tests are currently dominated by temp directory setup and git subprocess orchestration. This increases runtime and brittleness, and limits deterministic failure reproduction. This CR migrates behavior-level coverage to fake runtime harnesses and leaves only true integration cases on real repositories.
    scope:
        - internal/service
        - internal/service/tasks
    non_goals:
        - No CLI test harness changes (handled in separate CR).
        - No production behavior changes in service commands.
        - No removal of required real-git integration coverage.
    invariants:
        - Functional assertions for migrated tests remain equivalent.
        - Integration tests that validate real git semantics remain present.
        - Test flake rate and runtime should improve, not regress.
    blast_radius: Service test suite architecture, helper utilities, and classification of unit vs integration tests. Main risk is accidental loss of integration coverage during migration.
    risk_critical_scopes:
        - internal/service
    risk_tier_hint: medium
    risk_rationale: Broad test-surface migration touching many critical service behavior suites.
    test_plan: go test ./internal/service/... -count=1 && go test ./... -count=1 && go vet ./...
    rollback_plan: Revert the CR merge commit.
