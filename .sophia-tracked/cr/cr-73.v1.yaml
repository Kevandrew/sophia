cr:
    id: 73
    uid: cr_91aac07d-6cab-4062-97a3-067f5ef31b5c
    title: Active-CR fallback for read-only commands
    description: Allow core read-only CR commands to infer CR id from active branch when selector is omitted, and return actionable no_active_cr_context errors instead of raw arity messages.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: c0d0a61e4ddfb45d0920b3f262c4a6a53f3a26d6
    branch: cr-active-cr-fallback-for-read-only-commands-91aa
    merged_at: "2026-02-25T19:08:52Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        Core read-only CR commands currently fail with a raw arity error when no selector is passed, even when the user is already on an active CR branch. This creates friction for interactive usage and harms machine-driven workflows that expect context-aware, actionable failure modes.

        This change makes selected read-only commands selector-optional: explicit id/uid/branch selectors keep existing behavior, while omitted selectors resolve to the active CR from current branch context. When no active CR context exists, the command should fail with structured no_active_cr_context semantics and guidance rather than Cobra arity output.
    scope:
        - docs
        - internal/cli
    non_goals:
        - Do not add fallback to latest/open CR when branch context is missing.
        - Do not change mutating command selector requirements.
    invariants:
        - Explicit selector resolution remains unchanged and backward compatible.
        - JSON error envelopes remain stable and machine-readable.
    blast_radius: Affects core read-only command arg contracts and no-arg resolution flow for status/why/impact/validate/review/doctor/check status, plus related help/docs and CLI tests.
    test_plan: go test ./internal/cli/... && go test ./... && go vet ./...
    rollback_plan: Revert the merge commit for [CR-73] if optional-selector behavior regresses CLI workflows.
