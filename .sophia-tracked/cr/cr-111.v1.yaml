    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: Implement archive full-diff snapshots so merged CR archives can optionally include reproducible full patch context for forensic review and automation. Done means include_full_diffs true is supported under a versioned archive document contract with deterministic output and explicit guardrails.
    scope:
        - docs/cli-reference.md
        - docs/repository-policy.md
        - internal/cli
        - internal/cli/cr_cmd_archive.go
        - internal/model
        - internal/service
        - internal/service/service_archive.go
        - internal/service/service_policy.go
    non_goals:
        - No change to default archive policy behavior when include_full_diffs is false.
        - No redesign of append-only archive revision behavior.
        - No remote archive storage integration in this CR.
        - No unrelated archive format proliferation beyond planned versioning.
    invariants:
        - Archive writes remain append-only and never rewrite prior revisions.
        - Existing archive readers can continue consuming prior revision formats.
        - Full-diff generation is deterministic for the same merge commit and repo state.
        - Guardrail failures do not produce partial archive files.
    blast_radius: Archive policy validation, archive document schema, merge snapshot generation, archive CLI surfaces, and policy/docs references. Failure modes include oversized artifacts, unstable diff output, and reader compatibility breaks.
    risk_critical_scopes:
        - internal/service/service_archive.go
    risk_tier_hint: medium
    risk_rationale: Archive artifacts are compliance and audit surfaces; malformed or non-deterministic snapshots reduce trust in historical records.
    test_plan: go test ./internal/service -run 'Archive|Policy' -count=1 && go test ./internal/cli -run 'Archive' -count=1 && go test ./... -count=1 && go vet ./...
    rollback_plan: Revert the [CR-111] merge commit and return include_full_diffs to unsupported behavior.
