    title: Implement archive v2 full-diff snapshots
    description: Implement archive.include_full_diffs=true behavior with deterministic full-diff capture in archive artifacts, including size and format guardrails that preserve append-only archive integrity.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 53b30c8c40081cf3094f9611e64ff63cfdb90341
    branch: cr-implement-archive-v2-full-diff-snapshots-7779
