cr:
    id: 70
    uid: cr_5a81612b-b9f7-4292-870e-0220c1bd9083
    title: 'Tech debt: introduce service runtime ports for CR lifecycle/status/merge domains'
    description: Replace direct Service coupling to concrete git/store operations in CR lifecycle, status, and merge orchestration with explicit runtime ports so behavior can be unit-tested without repository/process setup. Preserve existing CLI/API behavior while making service logic mock-friendly.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 74734a1ce24c539fcded186a810e30cf97f49830
    branch: cr-tech-debt-introduce-service-runtime-ports-for-cr-5a81
    merged_at: "2026-02-25T14:58:59Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: CR lifecycle, status, and merge paths currently couple orchestration logic to concrete git and store implementations. That coupling drives large integration-heavy test surfaces and slows feedback loops. This CR introduces narrow runtime ports and adapter wiring for these domains so behavior-level tests can execute without spinning up repositories or invoking git subprocesses.
    scope:
        - internal/service/service.go
        - internal/service/service_archive.go
        - internal/service/service_archive_test.go
        - internal/service/service_common.go
        - internal/service/service_cr.go
        - internal/service/service_cr_status.go
        - internal/service/service_diff.go
        - internal/service/service_merge_guard.go
        - internal/service/service_public_contract_test.go
        - internal/service/service_review_merge.go
        - internal/service/service_runtime_ports.go
        - internal/service/service_runtime_ports_integration_test.go
        - internal/service/service_runtime_ports_test.go
        - internal/service/service_worktree.go
    non_goals:
        - No CLI flag or output contract changes.
        - No CR/task YAML schema or JSON envelope changes.
        - No broad service test migration in this CR (handled separately).
    invariants:
        - Existing CR lifecycle semantics remain equivalent.
        - Existing merge guards and mutation lock behavior remain equivalent.
        - Existing status/validation merge blocker semantics remain equivalent.
    blast_radius: Service runtime composition for CR lifecycle/status/merge paths, including branch checks, merge preflight/finalize orchestration, and status derivation. Failure modes are adapter miswiring, missing runtime methods, or behavior drift in merge guard paths.
    risk_critical_scopes:
        - internal/service
    risk_tier_hint: high
    risk_rationale: Core merge and lifecycle orchestration is being decoupled from concrete git/store calls.
    test_plan: go test ./internal/service -run 'CR|Merge|Status' && go test ./... && go vet ./...
    rollback_plan: Revert the CR merge commit.
