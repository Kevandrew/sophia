cr:
    id: 97
    uid: cr_17a48a12-0358-4e42-98fa-822af9c650a1
    title: Checkpoint-native commit classification
    description: Checkpoint commits currently default to chore when task titles are not prefixed, which makes intent hard to scan in history and PR timelines. We need per-checkpoint commit classification so each checkpoint subject reflects the actual change type.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 1a6564d20503ccf01411e997e7f8d760fad60127
    branch: cr-checkpoint-native-commit-classification-17a4
    merged_at: "2026-03-01T12:38:50Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        Sophia is agent-first in this repo, so checkpoint commit typing should be driven by the LLM agent at checkpoint time, not by implicit title parsing alone. The primary outcome is explicit per-checkpoint type control via CLI so agents can select the correct conventional prefix deterministically for each checkpoint.

        Decision boundary: keep Sophia runtime deterministic and offline-capable. The CLI will not call an LLM internally. Instead, agents must pass explicit commit type via task-done flags and the Sophia skill will codify this behavior. Backward compatibility remains for manual users via existing fallback inference and chore fallback.
    scope:
        - .
    non_goals:
        - Do not add runtime/provider-coupled LLM API calls inside Sophia CLI.
    invariants:
        - Checkpoint commits remain deterministic for identical task inputs.
        - Existing checkpoint metadata footers and scope semantics stay unchanged.
        - Task completion guardrails and scope validation behavior remain intact.
    blast_radius: Affects cr task done CLI flags/validation, service checkpoint message type resolution precedence, checkpoint-related CLI/service tests, and agent guidance docs (skills/sophia/SKILL.md plus workflow references).
    risk_tier_hint: low
    risk_rationale: Agent-selected explicit type improves semantic commit quality while preserving deterministic fallback behavior.
    test_plan: go test ./internal/service/... && go test ./internal/cli/... && go test ./...
    rollback_plan: Revert the [CR-97] merge commit to restore prior chore-default behavior.
