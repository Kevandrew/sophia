cr:
    id: 80
    uid: cr_de5e77c5-7f61-4dd4-aed9-cc09a46847d7
    title: Extract merge and task lifecycle orchestration from root Service
    description: Split merge lifecycle and task lifecycle orchestration into focused service domains, reducing method bloat and isolating high-risk mutation workflows.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: d3f1b0d13f7ad5ef37f6b12d4536a2ac0f440e42
    branch: cr-extract-merge-and-task-lifecycle-orchestration-f-de5e
    merged_at: "2026-02-27T07:16:04Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        Merge and task lifecycle logic is a major contributor to root Service complexity and currently mixes flow control, validation, and checkpoint semantics across large methods.

        This CR extracts merge and task lifecycle orchestration into dedicated domains with explicit responsibilities so mutation flows are easier to audit, test, and evolve.

        Success means merge and task commands preserve existing behavior, safety checks, and recovery semantics while the root Service becomes thinner.
    scope:
        - internal/cli/cr_cmd_review_merge.go
        - internal/cli/cr_cmd_task.go
        - internal/service/service.go
        - internal/service/service_commit_parse.go
        - internal/service/service_common.go
        - internal/service/service_diff.go
        - internal/service/service_errors_patterns.go
        - internal/service/service_merge_domain.go
        - internal/service/service_merge_errors.go
        - internal/service/service_merge_recovery_test.go
        - internal/service/service_merge_review_test.go
        - internal/service/service_policy.go
        - internal/service/service_review_merge.go
        - internal/service/service_task_checkpoint.go
        - internal/service/service_task_domain.go
        - internal/service/service_task_reopen_test.go
        - internal/service/service_task_runtime.go
        - internal/service/service_task_runtime_test.go
        - internal/service/service_tasks.go
        - internal/service/service_trust.go
        - internal/service/tasks
    non_goals:
        - Do not change merge policy semantics or override gate behavior.
        - Do not change task contract required fields or checkpoint command UX.
        - Do not redesign CR/task metadata persistence format.
    invariants:
        - CLI error surfaces for merge/task flows remain backward compatible.
        - Merge recovery, resume, and abort flows remain deterministic and auditable.
        - Scoped checkpoint behavior and mutation lock guarantees remain unchanged.
    blast_radius: Affects high-risk mutation orchestration for task completion and merge flow control, including recovery surfaces and command-layer wiring.
    risk_critical_scopes:
        - internal/cli
        - internal/service
    risk_tier_hint: high
    risk_rationale: Touches merge execution and task checkpoint correctness paths.
    test_plan: go test ./internal/service/... ./internal/cli/... -run 'Task|Merge' && go test ./... && go vet ./...
    rollback_plan: Revert the CR merge commit and run merge/task regression tests to restore prior orchestration behavior.
