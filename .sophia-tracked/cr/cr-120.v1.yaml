cr:
    id: 120
    uid: cr_25af4b82-8247-48ff-89c2-5a565cff07a1
    title: Worktree-native CR routing and ownership visibility
    description: Make CR navigation/status/errors worktree-aware so operators can immediately route to the correct worktree and avoid branch ownership collisions.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 84716f4b56ec8a1319463ca459ab887d9cb46f24
    branch: cr-worktree-native-cr-routing-and-ownership-visibil-25af
    merged_at: "2026-03-04T16:02:51Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        Sophia already detects branch ownership conflicts across linked worktrees, but the operator UX is still too coarse when this happens.
        Today, users get a generic failure and have to manually infer where to run the next command, which slows down PR/CR sync workflows and causes avoidable retries.

        This CR makes worktree ownership first-class in navigation and status surfaces.
        The goal is to give deterministic, machine-readable, and human-actionable routing information whenever a CR branch is owned by another worktree.

        Success means a user can run one read command, learn exactly where the CR is active, and copy a suggested command without guessing.
        Mutating behavior remains conservative: Sophia should never silently run mutations in a non-current worktree.
    scope:
        - docs
        - internal/cli
        - internal/gitx
        - internal/service
    non_goals:
        - Do not auto-create worktrees in this CR.
        - Do not auto-proxy mutating commands into another worktree.
        - Do not change branch alias/UID identity formats.
        - Do not change merge policy gates or approval requirements.
    invariants:
        - CR metadata identity (id/uid/branch) remains unchanged.
        - ErrBranchInOtherWorktree remains the canonical semantic error (errors.Is compatible).
        - JSON envelopes remain backwards compatible, with additive fields only.
        - Mutating commands never execute against a non-current worktree implicitly.
    blast_radius: 'CLI surfaces: cr where (new), cr switch/reopen/status output changes; service worktree resolution and branch ownership error shaping; JSON error details for branch_in_other_worktree; docs for worktree operator workflow.'
    risk_critical_scopes:
        - internal/cli
        - internal/service
    risk_tier_hint: high
    risk_rationale: Touches core CR navigation and mutation guardrails used in daily workflows.
    test_plan: go test ./internal/service ./internal/cli ./internal/gitx && go test ./... && go vet ./...
    rollback_plan: Revert the CR merge commit and run `sophia repair --refresh` to reconcile local metadata with git history.
