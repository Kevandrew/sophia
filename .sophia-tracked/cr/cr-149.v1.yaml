contract:
    why: |-
        Polish the CR list dashboard so aggregate parent rows behave like a natural disclosure control and long sidebar content stays inside the fixed detail column. The user-visible outcome is that clicking an aggregate CR row opens or closes its inline child stack, and long branch or sub-CR text no longer widens the sidebar.

        This CR is intentionally limited to the list template behavior and layout constraints in the dashboard view. It does not change backend CR data, dashboard payload shape, or non-dashboard CR views.
    scope:
        - internal/cli/cr_show_test.go
        - internal/cli/templates/cr_list.html
    non_goals:
        - Do not change CR JSON payloads or server-side rendering data.
        - Do not redesign the overall dashboard layout or styling outside the existing template.
    invariants:
        - Clicking a CR row must still select that CR and render the sidebar detail panel.
        - Long sidebar content must truncate within the existing sidebar width rather than expanding the layout.
    blast_radius: Touches the CR list dashboard template's inline interaction and sidebar CSS in internal/cli/templates/cr_list.html. Failure modes are accidental row-click regressions, broken expand/collapse behavior for aggregate rows, or sidebar overflow/truncation regressions in detail and sub-CR sections.
    risk_tier_hint: low
    risk_rationale: Template-only UI polish scoped to a single HTML asset.
    test_plan: Verify the CR list dashboard renders aggregate rows that expand on row click and confirm long sidebar values remain clipped within the sidebar width; run go test ./internal/cli/...
    rollback_plan: Revert the CR-149 merge or checkpoint commit to restore the previous template behavior.
