contract:
    why: The add path currently uses multi-hop helper indirection for simple option mapping and tiny wrappers, increasing navigation cost without meaningful abstraction value. This CR flattens low-value helper layers while keeping behavior and output stable.
    scope:
        - internal/cli/cr/helpers.go
        - internal/cli/cr_cmd_core.go
        - internal/cli/cr_json_branch_ops_test.go
        - internal/service/cr/add.go
        - internal/service/service_cr.go
    non_goals:
        - Do not change add command behavior or output contracts.
        - Do not flatten helpers used by unrelated command families.
    invariants:
        - Any retained helper must represent non-trivial reusable behavior.
        - Option normalization remains functionally identical for add inputs.
    blast_radius: CLI add option-mapping path and tiny service/add helper boundaries.
    risk_tier_hint: low
    risk_rationale: Refactor targets low-level indirection with behavior held constant.
    test_plan: go test ./internal/cli ./internal/service
    rollback_plan: Revert the merge commit for this CR to restore previous helper layering.
