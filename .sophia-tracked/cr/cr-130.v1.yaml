contract:
    why: Add the actual per-CR launch surface in `cr show` so a user can trigger delegation from the existing localhost preview. This child is responsible for request construction and route wiring, not for live progress rendering after launch.
    scope:
        - internal/cli
    non_goals:
        - No backend-specific request shaping.
        - No live status timeline rendering in this child CR.
    invariants:
        - Launch payloads are derived from Sophia CR state, not ad-hoc prompt text.
        - The launch surface works through the runtime abstraction only.
    blast_radius: Touches `cr show` HTTP routes, launch payload shaping, and the per-CR template action surface. Failure modes are malformed launch payloads, accidental coupling to backend-native request shapes, or broken preview behavior when delegation is unavailable.
    risk_tier_hint: medium
    risk_rationale: Changes the per-CR localhost preview control surface and launch wiring.
    test_plan: go test ./internal/cli ./internal/service
    rollback_plan: Revert this child CR merge commit and remove the delegation launch action and routes from cr show.
