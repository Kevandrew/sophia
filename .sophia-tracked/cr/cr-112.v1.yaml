contract:
    why: Expand CR export capability so collaboration workflows can request richer include sets and additional output formats while keeping deterministic machine consumption. Done means export supports planned format and include expansion with stable schema versioning and backward compatibility for current bundle consumers.
    scope:
        - README.md
        - docs/cli-reference.md
        - docs/collaboration.md
        - internal/cli
        - internal/cli/cr_cmd_export.go
        - internal/model
        - internal/service
        - internal/service/service_export.go
    non_goals:
        - No breaking removal of current JSON export behavior.
        - No dependency on external collaboration platform services for export generation.
        - No unrelated refactors in non-export command families.
        - No unstable or non-deterministic ordering in export payloads.
    invariants:
        - Current JSON export output remains supported for existing workflows.
        - Equivalent CR state exports produce stable payload ordering.
        - Export includes are validated deterministically with explicit errors for unsupported values.
        - Schema/version metadata is explicit in every exported payload.
    blast_radius: Export service schema and include logic, export CLI flags and JSON envelopes, model types, and collaboration docs. Failure modes include consumer breakage, invalid include parsing, and inconsistent deterministic output.
    risk_critical_scopes:
        - internal/service/service_export.go
    risk_tier_hint: medium
    risk_rationale: Export payloads are consumed by automation and reviewers, so schema or ordering regressions can break downstream tooling.
    test_plan: go test ./internal/service -run 'Export|Bundle' -count=1 && go test ./internal/cli -run 'Export' -count=1 && go test ./... -count=1 && go vet ./...
    rollback_plan: Revert the [CR-112] merge commit and restore existing export format/include behavior.
