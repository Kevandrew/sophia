    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: Reduce friction in active-branch workflows by allowing selected mutating CR commands to infer the current CR when no selector is provided, while preserving explicit selector behavior and keeping high-risk operations explicit-only.
    scope:
        - docs
        - internal/cli
    non_goals:
        - Do not fallback to latest/open CR when branch context is missing.
        - Do not make merge/switch/reopen/base/restack/refresh infer selectors.
    invariants:
        - Explicit selector paths remain backward compatible.
        - No-active-context failures remain structured and actionable.
    blast_radius: Affects selector parsing and command arg UX for note/edit/contract set/task add/task contract set/task done/task reopen/evidence add, plus CLI tests and docs.
    test_plan: go test ./internal/cli/... && go test ./... && go vet ./...
    rollback_plan: Revert merge commit for CR-74 if mutation selector inference introduces ambiguity regressions.
