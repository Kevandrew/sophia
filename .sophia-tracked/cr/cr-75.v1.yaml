cr:
    id: 75
    uid: cr_8d135074-ffb7-4555-900e-36703ff89e44
    title: 'Agent-native output mode: SOPHIA_OUTPUT env var and TTY detection'
    description: LLM agents invoking sophia must append --json to every call today. A missing --json on any single invocation degrades silently to human-formatted text the agent cannot parse reliably. This CR introduces SOPHIA_OUTPUT=json as a process-level default and adds TTY detection so non-interactive callers get JSON automatically, matching the "agent-native first" product posture stated in the README.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 2687210a42ebfee2ff86b47792b84eb8447da1f9
    branch: cr-agent-native-output-mode-sophia-output-env-var-a-8d13
    merged_at: "2026-02-26T23:20:38Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        The primary consumers of sophia are LLM agents, not humans at a terminal. Requiring --json on every command forces agents to include it in every tool call and silently produce unparseable output when they forget. The outcome of this CR is that agents can set SOPHIA_OUTPUT=json once in their environment and receive machine- readable output on all commands without per-call flags.
        Decision boundary: env var and TTY detection only. We are NOT adding a persistent per-repo config setting; we are NOT changing existing --json flag semantics or JSON shapes; we are NOT touching HQ or collaboration surfaces.
        Success: an agent that never passes --json still gets valid JSON envelopes when SOPHIA_OUTPUT=json is set or when stdout is not a TTY.
    scope:
        - cmd
        - docs
        - internal/cli
        - skills
    non_goals:
        - No changes to HQ, collaboration, or repair commands.
        - No changes to JSON envelope shape or error code taxonomy.
        - No changes to human-facing text output when TTY is detected and SOPHIA_OUTPUT is unset.
        - No persistent per-repo or global config for output mode.
    invariants:
        - Existing --json flag behavior is unchanged when flag is explicitly passed.
        - JSON envelope shape (ok/data/error) is identical regardless of how JSON mode is activated.
        - Text output remains default when stdout is a TTY and SOPHIA_OUTPUT is unset.
    blast_radius: 'CLI surfaces: all commands that accept --json today also respect SOPHIA_OUTPUT=json. Root command gains env-var inspection and TTY detection logic. No JSON field changes. Failure mode: TTY detection false-positive in CI - mitigated by SOPHIA_OUTPUT=text override.'
    risk_tier_hint: low
    test_plan: go test ./internal/cli/... && go test ./... && go vet ./...
    rollback_plan: Revert the CR merge commit.
tasks:
