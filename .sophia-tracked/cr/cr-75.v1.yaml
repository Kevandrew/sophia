      title: Read SOPHIA_OUTPUT env var in root command and propagate to all subcommands
      status: done
      contract:
        intent: When SOPHIA_OUTPUT=json is set, every command that has a --json flag activates JSON mode without the flag being explicitly passed.
        acceptance_criteria:
            - Explicit --json flag still works and takes precedence over env var.
            - SOPHIA_OUTPUT=json causes all --json-capable commands to emit the JSON envelope.
            - SOPHIA_OUTPUT=text (or unset with TTY) produces human text output.
        scope:
            - internal/cli/cr_cmd_core.go
            - internal/cli/root.go
      checkpoint:
