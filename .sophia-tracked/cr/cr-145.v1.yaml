contract:
    why: The list surface should make stack ownership obvious at a glance. Aggregate parents need to visually own their child CRs instead of appearing as flat peers with metadata badges. This child gives `cr list` a collapsible threaded-tree model for stacked work.
    scope:
        - internal/cli
        - internal/cli/templates
    non_goals:
        - No aggregate-parent cr show redesign in this child CR.
        - No new stack lifecycle behavior.
    invariants:
        - Collapsed and expanded stack states preserve accurate resolution counts.
        - Unstacked CRs remain easy to scan.
    blast_radius: Touches list/dashboard rendering, nested row structure, and client-side expansion behavior. Failure modes are visually noisy rows, broken collapse state, or inaccessible nested controls.
    risk_tier_hint: medium
    risk_rationale: Changes the default list reading pattern for stacked work.
    test_plan: go test ./internal/cli
    rollback_plan: Revert this child CR to restore flat list rendering for stacks.
