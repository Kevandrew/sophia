contract:
    why: Complete PR lifecycle controls in Sophia CLI so PR-gated teams can move between draft, ready, closed, and reopened states without leaving Sophia command surfaces. Done means unready and close/reopen operations are available, status remains deterministic, and merge gating continues to behave correctly.
    scope:
        - docs/cli-reference.md
        - docs/troubleshooting.md
        - docs/workflow.md
        - internal/cli
        - internal/cli/cr_cmd_pr.go
        - internal/service/service_pr_gate.go
        - internal/service/service_pr_gate_test.go
        - internal/service/service_review_merge.go
    non_goals:
        - No auto-ready behavior after PR open or sync.
        - No migration away from current GitHub-backed PR provider in this CR.
        - No new remote policy model beyond existing pr_gate rules.
        - No unrelated rewrite of merge status reporting.
    invariants:
        - Existing pr open, sync, ready, and status commands remain backward compatible.
        - Local CR metadata stays consistent with remote PR state reconciliation.
        - PR lifecycle mutations remain explicit user actions only.
        - Permission and auth failures remain structured and machine readable.
    blast_radius: PR command surface, PR gate service operations, JSON status/action metadata, merge-gate interactions, and workflow docs. Failure modes include stale status, incorrect gate blocking, and failed remote lifecycle transitions.
    risk_critical_scopes:
        - internal/service/service_pr_gate.go
    risk_tier_hint: medium
    risk_rationale: Touches PR gate state transitions and reconciliation paths that can block or unblock merges across team workflows.
    test_plan: go test ./internal/service -run 'PR|Merge|Gate' -count=1 && go test ./internal/cli -run 'PR' -count=1 && go test ./... -count=1 && go vet ./...
    rollback_plan: Revert the [CR-110] merge commit and fall back to current PR lifecycle command set.
