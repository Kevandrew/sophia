cr:
    id: 117
    uid: cr_6406dd23-e2f8-4b3b-8b02-f191c0e782a5
    title: Add CR show control action sub-navbar
    description: Add a cohesive secondary control-panel navbar under the main navbar in cr show/dashboard for PR publish/sync, refresh, validate, review, merge, and pull actions.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 17ae5fd3d27af3759986bdba9a75dfa07c82b262
    branch: cr-add-cr-show-control-action-sub-navbar-6406
    merged_at: "2026-03-03T00:57:56Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        The current cr show UI requires terminal-centric operation for core lifecycle controls. This CR adds an in-page control action bar so operators can steer agent work without leaving the dashboard context. The goal is faster steering and fewer context switches while preserving Sophia as the source of truth and audit trail.

        The control panel will be a secondary sticky navbar directly beneath the existing top navbar, matching the local control-plane visual language. Actions are weighted by importance rather than identical button emphasis, so merge/publish/sync remain visually distinct from lower-risk controls. Mobile behavior will preserve usability via horizontal overflow or compact wrapping rather than forced equal-width 7-up buttons.

        Success criteria: operators can invoke publish PR, PR sync, refresh, validate, review, merge, and pull actions from the page; each action has clear preflight/confirmation where needed; command execution status and errors are visible inline; and UI styling remains cohesive with the current cr show/dashboard design system.
    scope:
        - internal/cli/cr_cmd_show.go
        - internal/cli/cr_show_test.go
        - internal/cli/templates/cr_list.html
        - internal/cli/templates/cr_show.html
    non_goals:
        - No full in-browser terminal or arbitrary command runner.
        - No replacement of Sophia CLI semantics or merge policy enforcement.
        - No unrelated visual redesign outside control-bar integration.
    invariants:
        - All control actions map to explicit Sophia/Git commands with visible outcomes.
        - Control bar remains visually cohesive with existing local flow and sticky navbar structure.
        - Risky actions require confirmation and must not execute silently.
    blast_radius: Adds mutating control actions to localhost preview UI, new command invocation endpoints in cr show server path, and additional UI state for action progress/error/confirmation across per-CR and dashboard modes.
    test_plan: go test ./internal/cli -run TestCRShow -count=1 && go test ./internal/cli -run TestCRListTemplate -count=1 && go test ./internal/cli -run TestCRShowTemplate -count=1
    rollback_plan: Revert CR 117 merge commit to remove control actions and restore read-only cr show behavior.
