    title: Encode explicit add default-switch semantics by entrypoint
    description: Make add default-switch behavior explicit and intentional across CLI and service entrypoints to reduce confusion.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: fa141979ee9e4e524ef7728411fb8bd7e35fc256
    branch: cr-encode-explicit-add-default-switch-semantics-by-1a15
    merged_at: "2026-03-04T17:53:13Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: 'Current defaults differ by entrypoint: CLI add defaults to no-switch while service AddCR convenience defaults to switching. This is intentional in practice but implicit in code shape, creating confusion for maintainers and agents. This CR makes defaults explicit by entrypoint and locks expected behavior with focused tests and docs/help adjustments where needed.'
    scope:
        - internal/cli/cr_cmd_core.go
        - internal/cli/cr_json_branch_ops_test.go
        - internal/cli/root.go
        - internal/service/service_cr.go
        - internal/service/service_cr_add_switch_test.go
        - internal/service/service_delegate_stack.go
    non_goals:
        - Do not force one global default across all entrypoints in this CR.
        - Do not introduce breaking changes to existing callers.
    invariants:
        - CLI add remains opt-in switch via --switch.
        - Programmatic AddCR convenience behavior remains compatible unless explicitly documented otherwise.
    blast_radius: Default behavior documentation/encoding for add entrypoints, plus tests asserting CLI/service divergence is deliberate and stable.
    risk_tier_hint: medium
    risk_rationale: Touches semantics interpretation and user/operator expectations.
    test_plan: go test ./internal/service ./internal/cli
    rollback_plan: Revert the merge commit for this CR to return to prior implicit default semantics.
