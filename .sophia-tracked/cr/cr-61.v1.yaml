cr:
    id: 61
    uid: cr_c39a1828-0cc0-461b-bda0-3ea7b80e57bb
    title: PR-gated merge with deterministic CR-backed PR context
    description: |-
        Add a PR-gated merge mode where `sophia cr merge` does not directly merge when review gates are required.
        Instead, it creates/updates one PR from implemented CR state (intent + checkpoints + validation/trust evidence),
        then blocks until review gates are satisfied.

        This keeps the fast flow (ideate -> implement -> one PR) while reducing rubber-stamp risk by making merge gating explicit.
        Local CLI remains focused on structured context and merge gating; deeper collaboration workflows stay on the hq side.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 0a4b1285e0d4d375c89f4a119de9b857be593748
    branch: cr-61-pr-draft-context-generation-from-cr-intent
    merged_at: "2026-02-28T16:40:32Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        Teams can still rubber-stamp even when PRs are required, because PR text is often unstructured and merge checks are not tied to the original intent. Sophia already captures intent/contracts/checkpoints; this CR uses that data to make one implemented PR reviewable and policy-gated before merge.

        The goal is not to force multiple PRs or pre-implementation PR churn. The goal is to publish one high-signal PR per CR after implementation and require explicit review gates for final merge in team workflows.

        For solo workflows, local merge mode remains available and explicit override behavior stays audited.

        Identity constraint (from CR-62): local monotonic CR IDs and raw CR UIDs are internal-only identifiers used for local CLI UX. The PR title and body must use the CR title and branch slug as the human-readable reference, never local numeric IDs or raw UIDs. The branch identity scheme (human_alias_v2) already provides collision-resistant shared identifiers for cross-developer use.

        PR body specification: The Sophia-managed PR body section must be deterministic and structured, containing: (1) CR title and branch slug identity, (2) base ref and risk tier, (3) contract why (verbatim), (4) declared scope, invariants, and non-goals, (5) task completion table with checkpoint commits and scope-drift indicators, (6) drift records with acknowledgement status, (7) evidence ledger summary (command runs, exit codes), (8) diff summary stats, (9) rollback plan. The managed section must be delimited by machine-readable markers so that reviewer-authored text outside the markers is preserved on sync updates.
    scope:
        - docs
        - internal/cli
        - internal/model
        - internal/service
        - internal/store
    non_goals:
        - No automatic branch push; missing remote branch remains an actionable failure.
        - No changes to task checkpoint commit format or contract/trust core semantics.
        - No hq-side collaboration editing, reviewer routing, or dashboard workflows in this CR.
        - No multi-provider SCM support beyond GitHub via `gh` in this CR.
    invariants:
        - 'Checkpoint sync is idempotent: no duplicate checkpoint comments on repeated sync.'
        - Exactly one PR per CR is the default publication model in PR-gated mode.
        - Merge override remains explicit and audited, never implicit.
        - PR body updates only replace Sophia-managed sections and preserve unmanaged reviewer notes.
    blast_radius: 'CLI: cr pr context/draft/open/sync/status commands and cr merge finalize; CR merge path changes in pr_gate mode; Policy schema adds merge.mode and review requirement fields; PR sync state persisted in CR YAML; gh CLI used as GitHub provider; Failure modes: branch not pushed, gh auth missing, PR body marker corruption, checkpoint comment duplication, review gate evaluation mismatch.'
    test_plan: go test ./... && go vet ./...
    rollback_plan: Revert this CR merge commit to restore current merge behavior and remove PR-gated mode.
