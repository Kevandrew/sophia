    uid: cr_6ed228f2-7612-4bc6-bc9a-ec083efe36d6
    title: Refactor cr show preview launch into an explicit session state machine
    description: Replace the current ad hoc browser-launch booleans in cr show with a single preview-session orchestration path, and fix the bug where slow browser startup makes the preview appear to fail or exit early.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: ab0661d51ecc4eecf42ca8314e69cf7252aa37a3
    branch: cr-refactor-cr-show-preview-launch-into-an-explicit-6ed2
    merged_at: "2026-03-06T00:56:39Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: Fix the broken and brittle launch behavior in `sophia cr show` by replacing the current ad hoc browser-launch booleans with an explicit preview-session orchestration model. Today, a slow browser startup can delay the CLI for several seconds, print success only after waiting, and then tear the localhost preview down if no page request arrives before the timeout. That is the wrong lifecycle. The preview server should become available immediately, console output should be deterministic, and browser attachment timing should not control whether the preview survives.
    scope:
        - internal/cli
    non_goals:
        - No change to CR/dashboard payload semantics.
        - No redesign of the HTML UI surfaces in this CR.
    invariants:
        - A slow browser launch must not cause the localhost preview to appear failed or exit early.
        - Preview serving lifecycle is explicit and shared between per-CR and dashboard modes.
    blast_radius: Touches cr show CLI orchestration, localhost preview lifecycle, browser-launch behavior, and JSON/TTY reporting. Failure modes include broken browser auto-open, incorrect preview-session status reporting, or regressions in how the preview server stays alive.
    risk_tier_hint: medium
    risk_rationale: The change is localized to preview orchestration, but it affects the first-run behavior of a primary UI entrypoint.
    test_plan: go test ./internal/cli ./internal/service && manually verify `sophia cr show` and `sophia cr show <id>` with slow/manual browser attach behavior.
    rollback_plan: Revert the CR to restore the prior inline launch flow.
