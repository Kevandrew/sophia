cr:
    id: 72
    uid: cr_82566bb6-c99e-4c41-88d8-4d22d198d3ee
    title: 'Test infra: decouple CLI tests from global CWD and subprocess git'
    description: Replace global working-directory mutation and subprocess git setup in CLI tests with an injectable command harness and fake service dependencies for behavior-only command coverage.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: deb1cb3466281ba5a996e9fa769c5258e7b22585
    branch: cr-test-infra-decouple-cli-tests-from-global-cwd-an-8256
    merged_at: "2026-02-25T18:03:19Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: CLI tests currently rely on global cwd mutation, mutex serialization, and repeated git subprocess setup. This reduces parallelism and increases brittleness. This CR introduces explicit CLI test seams so behavior tests can execute against fake services while preserving a thin integration layer for end-to-end wiring.
    scope:
        - internal/cli
    non_goals:
        - No deletion of all integration CLI tests.
        - No service-domain production refactors in this CR.
        - No user-facing CLI command semantics changes.
    invariants:
        - Integration command smoke coverage remains present.
        - JSON envelope and text output contracts remain unchanged.
        - Selector parsing and error code mappings remain unchanged.
    blast_radius: CLI test harness and command dependency construction paths, especially root command execution, service creation injection, and JSON command tests. Main risks are accidental output drift and reduced coverage of real command wiring.
    risk_critical_scopes:
        - internal/cli
    risk_tier_hint: medium
    risk_rationale: Broad CLI test harness migration with command execution dependency rewiring.
    test_plan: go test ./internal/cli/... -count=1 && go test ./... -count=1 && go vet ./...
    rollback_plan: Revert the CR merge commit.
