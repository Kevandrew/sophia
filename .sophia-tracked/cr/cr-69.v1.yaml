    title: 'Tech debt: harden CR lifecycle concurrency and merge/status reliability'
    description: 'Track latent engineering risks in CR lifecycle code: inconsistent mutation-lock coverage, merge/status fallback fragility, and duplicated validation/status pathways. Intent is to unify helper patterns and reduce drift-prone code smells without changing CLI UX semantics.'
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 5c0943c2e8205769ea271a6f1e2381ff2eb73bf5
    branch: cr-tech-debt-harden-cr-lifecycle-concurrency-and-me-bfb5
