    - id: 5
      title: Isolate merge finalize error propagation fallback behavior
      status: done
      contract:
        intent: Isolate and fix merge finalize fallback error propagation so failures report the real failing operation.
        acceptance_criteria:
            - Existing successful merge finalize paths remain unchanged.
            - Finalize fallback branches no longer leak stale error variables from unrelated earlier operations.
            - When fallback diff resolution fails, returned errors identify the actual failing step deterministically.
