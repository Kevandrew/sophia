    - id: 3
      title: Refactor merge flow internals into shared preflight/execute/finalize helpers and clean error propagation
      status: done
      contract:
        intent: Refactor merge internals into shared preflight/execute/finalize helpers while preserving merge/recovery semantics.
        acceptance_criteria:
            - Conflict and in-progress merge paths keep deterministic error propagation and existing event emission behavior.
            - Merge and resume flows share helper logic for preflight checks, archive policy gating, and finalize transitions.
            - Refactor remains internal-only with no command or flag surface changes.
        scope:
            - internal/service
      checkpoint:
        commit: 659e4b0b
        at: "2026-02-25T13:49:32Z"
        source: task_checkpoint
        scope:
            - internal/service/service_review_merge.go
    - id: 4
      title: Add concurrency and lifecycle regression tests for lock-sensitive and fallback-sensitive paths
      status: done
      contract:
        intent: Add lock-sensitive lifecycle regression tests that prove concurrency serialization under shared mutation lock ownership.
        acceptance_criteria:
            - At least one newly lock-guarded lifecycle mutator test asserts blocking/wait behavior while another process holds the shared lock.
            - Concurrent mutation tests verify no lost writes and expected event counts for guarded mutation paths.
            - Regression coverage remains deterministic and stable in repeated local runs.
        scope:
            - internal/service
            - internal/store
      checkpoint:
        commit: f141a1b9
        at: "2026-02-25T13:49:39Z"
        source: task_checkpoint
