    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: Reduce latent reliability risks in CR lifecycle flows by unifying helper seams and removing duplicated status/merge logic paths that can drift under concurrency or fallback conditions. Keep this as a debt-hardening slice to improve robustness and maintainability before future feature work.
    scope:
        - internal/service
        - internal/store
    non_goals:
        - No metadata schema/version migration in this slice.
        - No user-facing CLI command/flag behavior changes.
    invariants:
        - CR creation, status, review, and merge semantics remain backward compatible.
        - Failure paths remain explicit and deterministic; no silent fallbacks.
    blast_radius: CR mutation locking paths, merge preflight/finalize internals, and status/validation/trust shared helper boundaries.
    risk_critical_scopes:
        - internal/service
        - internal/store
    risk_tier_hint: medium
    risk_rationale: Changes target correctness-sensitive lifecycle and merge paths.
    test_plan: go test ./internal/service ./internal/store && go test ./...
    rollback_plan: Revert the CR-69 merge commit.
tasks:
    - id: 1
      title: Unify mutation-lock coverage across CR lifecycle mutators
      status: done
      contract:
        intent: Serialize CR lifecycle mutations behind a single shared mutation lock and remove unlocked write paths.
        acceptance_criteria:
            - Every exported service mutator that persists CR/config/index state enters the shared mutation lock exactly once at the top-level method.
            - Existing mutator behavior and error messages remain backward compatible after lock coverage expansion.
            - New unlocked helper variants are only called from lock-held paths and do not reacquire the lock.
        scope:
            - internal/service
            - internal/store
      checkpoint:
        commit: 669ecb29
        at: "2026-02-25T13:49:21Z"
        source: task_checkpoint
        scope:
            - internal/service/service_branch_ops.go
            - internal/service/service_collab.go
            - internal/service/service_cr.go
            - internal/service/service_cr_history.go
            - internal/service/service_cr_integrity.go
            - internal/service/service_delegate_stack.go
            - internal/service/service_refresh.go
    - id: 2
      title: Consolidate CR status/validation context helpers to remove duplicated fallback paths
      status: done
      contract:
        intent: Consolidate status/validate/impact helper seams so branch fallback and policy context handling are deterministic and non-duplicated.
        acceptance_criteria:
            - Branch-context-unavailable cases still return explicit deterministic blockers/warnings from one validation source.
            - Status, validate, and impact flows use shared helper paths for diff/policy context instead of duplicated fallback branches.
            - Unreachable or duplicate fallback handling is removed without changing healthy-repo CLI semantics.
        scope:
            - internal/service
      checkpoint:
        commit: 99c4aa48
        at: "2026-02-25T13:49:29Z"
        source: task_checkpoint
        scope:
            - internal/service/service_cr_refs.go
