cr:
    id: 83
    uid: cr_58243169-0c2c-4c9f-81d1-c20f4fbdf424
    title: Simplify warning-bearing service APIs and collapse indirection chains
    description: Remove deep `WithWarnings` call chains in favor of clearer warning-bearing API boundaries while keeping user-visible command behavior stable.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: cb3e60af1269f661a736b3f59beecc615579726a
    branch: cr-simplify-warning-bearing-service-apis-and-collap-5824
    merged_at: "2026-02-27T12:13:11Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        Several service workflows currently pass through multiple thin layers of `WithWarnings` wrappers before reaching real implementation logic.

        This indirection reduces readability and increases maintenance overhead without delivering proportional compatibility value.

        This CR simplifies warning-bearing APIs to one clear boundary per workflow and keeps compatibility where necessary via minimal adapters.
    scope:
        - internal/cli/cr_cmd_core.go
        - internal/cli/cr_cmd_review_merge.go
        - internal/cli/cr_json_helpers_test.go
        - internal/cli/cr_json_test.go
        - internal/service/service_cr.go
        - internal/service/service_hq_sync.go
        - internal/service/service_integrity_overlap_hook_test.go
        - internal/service/service_merge_recovery_test.go
        - internal/service/service_merge_review_test.go
        - internal/service/service_public_contract_test.go
        - internal/service/service_review_merge.go
        - internal/service/service_test.go
    non_goals:
        - Do not alter warning text semantics unless required for correctness fixes.
        - Do not combine this with unrelated domain extraction changes.
        - Do not remove warning information from any command surface.
    invariants:
        - Callers can still access warnings for all workflows that currently expose them.
        - JSON output remains deterministic and backward compatible.
        - Primary command success/failure behavior remains unchanged.
    blast_radius: Affects service API boundaries and CLI callsites for warning-capable workflows; main risks are dropped warnings or accidental semantic changes in wrapper removal.
    risk_critical_scopes:
        - internal/cli
        - internal/service
    risk_tier_hint: medium
    risk_rationale: API simplification across multiple command paths with compatibility expectations.
    test_plan: go test ./internal/service/... ./internal/cli/... -run 'Warning|AddCR|Merge' && go test ./...
    rollback_plan: Revert the CR merge commit if warning propagation or caller compatibility regresses.
