cr:
    id: 77
    uid: cr_05910e49-2590-448c-95e2-fb82a4b43cf7
    title: 'Agent batch ergonomics: cr apply stdin, uniform dry-run, idempotent mutation signals'
    description: 'Three related agent ergonomic gaps: (1) cr apply requires writing a temp file before calling the command; (2) mutation commands like cr contract set and cr task done lack --dry-run, preventing agents from pre-validating before committing; (3) idempotent mutations return errors instead of a stable already_applied signal, making agent retry loops unnecessarily complex.'
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 92a0247e3fc9fd35ba3f383652d19877c4f2b31b
    branch: cr-agent-batch-ergonomics-cr-apply-stdin-uniform-dr-0591
    merged_at: "2026-02-26T23:39:45Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        Agents operate in loops. Each extra file I/O step, each inability to dry-run a mutation, and each non-idempotent error code adds latency and error-handling surface to every agent implementation. The outcome of this CR is: (1) agents can batch-create a CR plan from an inline YAML string without creating a temp file; (2) agents can dry-run key mutations to validate pre-conditions; (3) agents can retry mutations safely knowing already-applied state returns ok:true.
        Decision boundary: cr apply --stdin, --dry-run on contract set and task done, and already_applied signal on idempotent mutations. We are NOT redesigning the apply format, NOT adding batch task completion, NOT touching merge or validation semantics.
        Success: an agent can pipe a YAML plan to sophia without touching the filesystem, pre-validate a contract mutation with --dry-run, and retry cr contract set safely.
    scope:
        - internal/cli
        - internal/service
    non_goals:
        - No batch task completion command.
        - No changes to JSON envelope shape beyond adding already_applied field on relevant responses.
        - No changes to YAML plan format or schema.
        - No changes to merge, validate, or review dry-run semantics.
    invariants:
        - Dry-run never writes to .sophia/ YAML files or creates commits.
        - already_applied responses return ok:true so agent checks on ok field still pass.
        - cr apply --file behavior is unchanged.
    blast_radius: 'CLI surfaces: cr apply gains --stdin flag; cr contract set and cr task done gain --dry-run flag. Service layer gains idempotency check paths. JSON output: dry-run responses include dry_run:true field; idempotent responses include already_applied:true in data. Failure modes: stdin stream read errors surface as invalid_argument; dry-run validation errors surface identically to live run errors.'
    risk_tier_hint: low
    test_plan: go test ./internal/cli/... && go test ./internal/service/... && go vet ./...
    rollback_plan: Revert the CR merge commit.
tasks:
    - id: 1
      title: Add --stdin flag to cr apply to read YAML plan from stdin
      status: done
      contract:
        intent: When --stdin is passed, cr apply reads the YAML plan from stdin instead of requiring a --file path, removing the temp-file creation step from agent workflows.
        acceptance_criteria:
            - --dry-run and --stdin compose correctly.
            - --stdin and --file are mutually exclusive; passing both emits invalid_argument.
            - echo '<yaml>' | sophia cr apply --stdin --json works identically to sophia cr apply --file <path> --json.
        scope:
            - internal/cli/cr_cmd_core.go
            - internal/service/service_plan_apply.go
      checkpoint:
