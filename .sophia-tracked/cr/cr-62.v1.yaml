cr:
    id: 62
    uid: cr_42b579c7-f051-4c11-b662-f018f92fd7ba
    title: Team-safe branch identity with local monotonic UX
    description: Keep local CR numbering monotonic for day-to-day use while changing generated branch aliases to cr-<slug>-<uid4> (with automatic uid-length fallback on collision), preserving full UID as canonical identity in metadata/footers, and hardening selector resolution to prefer exact branch matches.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 165e0a36ff67b86a9da5776cc7ed4476b36fde16
    branch: cr-62-team-safe-branch-identity-with-local-monotonic-u
    merged_at: "2026-02-24T23:39:36Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        Multi-developer repositories can produce branch alias collisions when aliases include local CR IDs.
        This change keeps local monotonic IDs as internal UX while making shared branch aliases collision-resistant and non-sequential.
    scope:
        - docs
        - internal/cli
        - internal/service
    non_goals:
        - Do not auto-migrate existing in-progress CR branches.
        - Do not change local CR ID generation or list ordering.
    invariants:
        - Existing legacy branch aliases remain parseable.
        - Full CR UID remains the canonical identity in metadata and commit footers.
        - Local CR commands continue to use local monotonic CR IDs.
    blast_radius: Branch alias generation and validation, CR selector resolution semantics for branch-like inputs, branch migration target formatting, and branch-identity documentation/examples.
    risk_critical_scopes:
        - internal/service
    risk_tier_hint: medium
    risk_rationale: Touches identity and selector behavior used across CR workflows; incorrect resolution could route commands to the wrong CR.
    test_plan: go test ./... && go vet ./...
    rollback_plan: Revert the merge commit for this CR.
tasks:
    - id: 1
      title: Adopt UID-suffixed branch alias format and branch format UX
      status: done
      contract:
        intent: Switch generated CR branch aliases to UID-suffixed format and align branch formatting UX with existing CR metadata and owner-prefix behavior.
        acceptance_criteria:
            - CLI/docs/tests reflect accepted explicit alias forms for v1 and v2 branch formats.
            - Generated aliases use cr-<slug>-<uid4> with collision fallback lengths and preserve owner prefix when expected.
            - branch format supports existing --id without overrides, UID-based formatting, and JSON metadata including uid/scheme updates.
        scope:
            - docs/branch-identity.md
            - internal/cli/cr_cmd_branch.go
            - internal/cli/cr_cmd_core.go
            - internal/cli/cr_json_branch_identity_test.go
            - internal/cli/cr_json_branch_ops_test.go
