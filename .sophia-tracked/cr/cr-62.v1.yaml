        at: "2026-02-24T23:39:04Z"
        source: task_checkpoint
        scope:
            - internal/cli/cr_json_branch_ops_test.go
            - internal/service/service_branch_identity_test.go
    - id: 2
      title: Resolve CR selectors by exact branch and improve branch-based integrity checks
      status: done
      contract:
        intent: Make CR selector and integrity flows resolve branch-like references deterministically by exact stored branch or canonical refs, with clearer not-found behavior.
        acceptance_criteria:
            - Integrity parent inference accepts base refs expressed as branch, id ref, or uid ref and maps to the right parent CR.
            - JSON suggested-action switch hints resolve branch aliases via service lookup.
            - ResolveCRID errors explicitly for unknown branch-like selectors and no longer infers IDs from v2 alias strings.
        scope:
            - internal/cli/json.go
            - internal/service/service_cr_integrity.go
            - internal/service/service_selector.go
            - internal/service/service_selector_test.go
      checkpoint:
        commit: 10fe19df
        at: "2026-02-24T23:19:55Z"
        source: task_checkpoint
        scope:
            - internal/cli/json.go
            - internal/service/service_cr_integrity.go
            - internal/service/service_selector.go
            - internal/service/service_selector_test.go
    - id: 3
      title: Make CR plan dry-run predictions deterministic and parity-safe with apply
      status: done
      contract:
        intent: Keep CR plan dry-run predictions and apply outputs deterministic and aligned for id/uid/branch allocation while tolerating malformed legacy data.
        acceptance_criteria:
            - Dry-run and apply return matching created CR metadata for the same plan.
            - Malformed existing CR UIDs are ignored with warnings instead of aborting plan prediction.
            - Plan prediction allocates deterministic CR UIDs and branch aliases without colliding with existing CRs/branches.
        scope:
            - internal/service/service_plan_apply.go
            - internal/service/service_plan_apply_test.go
      checkpoint:
