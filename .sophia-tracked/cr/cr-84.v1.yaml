    title: Split internal/gitx monolith into concern-focused files
    description: Refactor `internal/gitx/git.go` into focused files by concern to improve readability and maintainability while preserving command execution behavior and error contracts.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: b1ce18ab4dccfcbf662d120f39d71882a40a1fc8
    branch: cr-split-internal-gitx-monolith-into-concern-focuse-1379
    merged_at: "2026-02-28T11:58:02Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        internal/gitx/git.go is currently a very large multi-concern file, which slows navigation and makes targeted changes riskier than necessary.

        This CR splits gitx implementation into concern-focused files with explicit ownership boundaries, preserving the same public API and runtime behavior.

        Success means no functional Git behavior changes, stable error surfaces, and simpler file-level ownership for future changes.
    scope:
        - internal/gitx
        - internal/gitx/git.go
    non_goals:
        - Do not alter exported gitx API signatures in this refactor.
        - Do not change Git command semantics or shell invocation behavior.
        - Do not change store/service behavior beyond imports required by file split.
    invariants:
        - All existing gitx tests continue passing with unchanged behavior.
        - Error wrapping and sentinel matching semantics remain equivalent.
        - No additional global state or hidden side effects are introduced.
    blast_radius: Affects gitx internal structure and import paths; primary risks are behavior drift in command invocation, error handling, or edge-case repository/worktree parsing.
    risk_critical_scopes:
        - internal/gitx
        - internal/service
    risk_tier_hint: high
    risk_rationale: gitx underpins many service workflows; structural mistakes can cause broad regressions.
    test_plan: go test ./internal/gitx/... && go test ./internal/service/... && go test ./...
    rollback_plan: Revert the CR merge commit and rerun gitx/service test suites to restore previous behavior.
