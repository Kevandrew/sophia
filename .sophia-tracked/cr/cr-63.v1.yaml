            - internal/service/service_review_merge.go
    - id: 3
      title: Handle metadata-only imported CRs in impact command
      status: done
      contract:
        intent: Make ImpactCR return a structured metadata-only result when branch context is unavailable, matching status/validate/review resilience.
        acceptance_criteria:
            - Impact output clearly indicates branch-context unavailability and uses deterministic fallback semantics.
            - ImpactCR does not return internal_error for imported metadata-only CRs.
        scope:
            - internal/service/service_collab_test.go
