            - internal/service/service_review_merge.go
    - id: 2
      title: Make validate/review resilient for imported metadata-only CRs
      status: done
      contract:
        intent: Prevent validate/review command failures when imported CR branch context is unavailable by returning structured metadata-only outputs instead of internal errors.
        acceptance_criteria:
            - Regression tests cover imported metadata-only status/validate/review and switch fallback/error behavior.
            - ReviewCR returns a payload with metadata-driven validation/trust context for metadata-only imported CRs and does not hard-fail on missing branch context.
            - ValidateCR returns a deterministic non-valid report (with branch-context warnings/errors) instead of failing for metadata-only imported CRs.
        scope:
            - internal/service/service_collab_test.go
            - internal/service/service_cr.go
            - internal/service/service_review_merge.go
      checkpoint:
        commit: d2b720d1
        at: "2026-02-24T23:55:32Z"
        source: task_checkpoint
