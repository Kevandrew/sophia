cr:
    id: 81
    uid: cr_ea424760-551a-46d6-9672-529dfbe65e0d
    title: Redistribute domain types out of service.go into ownership-local files
    description: Break up the 1k+ line service type dump by moving trust/impact/validation/HQ/report types near their usage to improve navigability and ownership.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: f3d40767a12fa1be8ace7b44dacd6420339eadd2
    branch: cr-redistribute-domain-types-out-of-service-go-into-ea42
    merged_at: "2026-02-27T11:37:16Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: service.go currently centralizes a large set of domain/report/type definitions that are consumed by disparate features, making the file a navigation bottleneck and obscuring ownership.\n\nThis CR moves remaining non-trust type definitions to ownership-local files so each domain (impact, integrity, HQ) owns its own type vocabulary and service.go is limited to core composition concerns.\n\nTrust type relocation is intentionally handled in CR 79 to avoid duplicated refactor work across CR boundaries.\n\nSuccess means no behavior changes, stable serialized output, and a materially smaller service.go with clearer file-level ownership.
    scope:
        - internal/cli/cr_json_mappers.go
        - internal/service/service.go
        - internal/service/service_cr_integrity.go
        - internal/service/service_cr_integrity_types.go
        - internal/service/service_hq.go
        - internal/service/service_hq_status.go
        - internal/service/service_impact.go
        - internal/service/service_impact_types.go
    non_goals:
        - Do not alter CLI contract fields or JSON key names.
        - Do not change trust/impact/validation algorithms in this CR.
        - Do not duplicate trust type relocation already implemented in CR 79.
        - Do not introduce package-level API churn unrelated to type ownership moves.
    invariants:
        - All exported and serialized type fields remain backward compatible.
        - Type moves are mechanical ownership changes with no semantic drift.
        - service.go remains the composition root and does not gain new domain logic.
    blast_radius: Affects internal service type placement and compile-time imports; key risk is accidental serialization or visibility drift from moved definitions.
    risk_critical_scopes:
        - internal/service
    risk_tier_hint: medium
    risk_rationale: Primarily structural refactor but touches widely used shared types.
    test_plan: go test ./internal/service/... ./internal/cli/... && go test ./...
    rollback_plan: Revert the CR merge commit if any type move causes API or serialization regressions.
