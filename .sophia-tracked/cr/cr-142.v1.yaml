contract:
    why: |-
        Aggregate parent CRs currently expose the right metadata but still read too much like flat records with incidental stack annotations. That makes stacked work feel retrofitted instead of native. The outcome of this stack is a cohesive threaded-tree presentation across `cr show` and `cr list`: aggregate parents become visible stack roots, child CRs read as the actual review and execution slices, and lineage, resolution, and stack health become legible at a glance.
        The redesign should preserve the current localhost-preview model and existing stack semantics while changing the visual grammar so parent and child CRs feel structurally related rather than merely adjacent.
    scope:
        - internal/cli
        - internal/cli/templates
        - internal/service
        - skills/sophia
    non_goals:
        - No CR lifecycle or merge-policy changes in this stack.
        - No dashboard/router rewrite beyond what the UI needs for threaded rendering.
        - No removal of delegated task metadata from the underlying model.
    invariants:
        - Aggregate parents keep child CRs as the primary visible work units while preserving delegated-task auditability.
        - Normal non-stacked CRs continue to render cleanly without threaded-tree chrome.
        - cr show and cr list remain semantically consistent about stack role, lineage, and resolution state.
    blast_radius: Touches stack-aware read models, cr show payload shaping, HTML template rendering for aggregate parents and list rows, and workflow guidance in the Sophia skill. Failure modes include confusing or duplicated stack information, broken child navigation, or visually noisy list rendering that obscures normal CR scanning.
    risk_critical_scopes:
        - internal/cli
        - internal/cli/templates
        - internal/service
    risk_tier_hint: medium
    risk_rationale: Primarily UX and read-model work, but it changes the primary presentation of stack structure in first-class CR surfaces.
    test_plan: go test ./internal/service ./internal/cli && go test ./...
    rollback_plan: Revert this stack to restore the current flat stack rendering and aggregate-parent presentation.
