    title: Aggregate parent threaded-tree UI for cr show and cr list
    description: Redesign stacked CR surfaces so aggregate parents render as first-class threaded trees with child CRs as the primary visible work units.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 9c8032240475c607a938f3bb2fe7cb7e432580f5
    branch: cr-aggregate-parent-threaded-tree-ui-for-cr-show-an-6095
    merged_at: "2026-03-06T00:36:52Z"
