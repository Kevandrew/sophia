    scope:
        - internal/cli
        - internal/cli/templates
        - internal/service
    non_goals:
        - Do not remove support for --status abandoned.
    invariants:
        - Change remains additive/non-breaking for explicit abandoned filtering.
        - Status filtering remains explicit and deterministic when --status is provided.
    blast_radius: cr show dashboard filtering path and active/merged grouping behavior.
