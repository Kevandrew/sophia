contract:
    why: Introduce persisted delegation-run state as first-class Sophia metadata so the rest of the stack can rely on a stable runtime-neutral record of launch intent, progress, and terminal outcome. This child defines the storage contract, not a worker implementation.
    scope:
        - internal/model
        - internal/service
        - internal/store
    non_goals:
        - No UI launch or live rendering in this child CR.
        - No concrete external runtime adapter in this child CR.
    invariants:
        - All new metadata remains backend-agnostic.
        - Existing CR/task YAML remains readable and compatible.
    blast_radius: Touches CR model/storage and new service entrypoints for delegation-run persistence. Failure modes are schema drift, ambiguous lifecycle states, or leaked provider-specific fields in persisted metadata.
    risk_tier_hint: medium
    risk_rationale: Changes core CR metadata persistence and service read/write paths.
    test_plan: go test ./internal/model ./internal/store ./internal/service
    rollback_plan: Revert this child CR merge commit and remove delegation-run persistence fields and helpers introduced here.
