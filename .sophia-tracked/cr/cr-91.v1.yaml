    title: Improve checkpoint sync timeline and comment payload
    description: Make checkpoint sync timeline intent-first by enforcing per-checkpoint ordering (comment first, then push checkpoint commit) and enrich checkpoint comments with task contract details (intent, acceptance criteria, scope, commit summary) for reviewer clarity.
    status: merged
