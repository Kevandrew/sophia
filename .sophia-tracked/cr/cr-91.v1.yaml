contract:
    why: Checkpoint sync comments should act as reviewer-facing intent records, not after-the-fact noise. In PR-first mode, each checkpoint must present intent and acceptance context before code movement so reviewers can read the timeline top-down as decision then implementation. This CR enforces deterministic per-checkpoint ordering (comment first, then checkpoint push) and upgrades checkpoint comments to include task contract details (intent, acceptance criteria, scope, and commit summary) for high-signal review handoff.
    scope:
        - internal/service/service_pr_gate.go
        - internal/service/service_pr_gate_test.go
    non_goals:
        - Change merge gate policy evaluation semantics.
        - Introduce non-GitHub providers in this CR.
        - Redesign the managed PR body sections outside checkpoint sync comments.
    invariants:
        - Checkpoint sync remains idempotent across repeated sync runs and force-push scenarios.
        - Local merge.mode=local behavior remains unchanged.
        - 'PR-first flow remains deterministic: one checkpoint sync event per task checkpoint key.'
    blast_radius: Touches PR-gate sync orchestration, gh comment behavior, checkpoint idempotency ledger handling, and reviewer timeline readability in GitHub PRs.
    risk_tier_hint: medium
    risk_rationale: Changes affect remote sync sequencing and PR timeline artifacts; regressions could duplicate comments or degrade sync determinism.
    test_plan: go test ./internal/service/... -count=1 && go test ./... -count=1 && go vet ./...
    rollback_plan: Revert CR-91 commits to restore previous checkpoint sync ordering/comment format behavior.
