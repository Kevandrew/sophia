cr:
    id: 115
    uid: cr_cb79c7b6-3785-49da-a28c-d21de34fda61
    title: Add dashboard mode to sophia cr show for CR list and global history
    description: Add a read-only localhost dashboard fallback for sophia cr show that lists CRs and displays global CR timeline/history while preserving per-CR show behavior when ID or active CR context is present.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: e07f5e08b511f19aaf667d9a2b8318d019c0dd02
    branch: cr-add-dashboard-mode-to-sophia-cr-show-for-cr-list-cb79
    merged_at: "2026-03-02T21:06:58Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: Enable sophia cr show to render a human-friendly dashboard when no active CR context is available, so reviewers can inspect all CRs and global change history in one read-only localhost view. Preserve existing per-CR report behavior for explicit IDs and active CR branches while sharing the same visual design language used by the current CR show page.
    scope:
        - internal/cli/cr_cmd_show.go
        - internal/cli/cr_optional_selector_test.go
        - internal/cli/cr_show_test.go
        - internal/cli/templates/cr_list.html
        - internal/cli/templates/cr_show.html
    non_goals:
        - No behavior changes to sophia cr history command semantics.
        - No in-browser editing of CR metadata, tasks, or contract fields.
        - No mutating actions from the dashboard UI.
    invariants:
        - Dashboard template remains single-file HTML with inline CSS and JS.
        - Preview remains localhost-only, read-only, and closable via the UI close endpoint.
        - sophia cr show <id> keeps existing per-CR report behavior and JSON surface.
    blast_radius: Touches CR show command routing, localhost preview payload/schema for dashboard mode, new dashboard template rendering, and CLI tests around show fallback/flags/template invariants.
    risk_critical_scopes:
        - internal/cli/cr_cmd_show.go
    risk_tier_hint: medium
    risk_rationale: Routing and payload changes affect operator UX and automation consumers of cr show JSON mode.
    test_plan: go test ./internal/cli -run TestCRShow && go test ./...
    rollback_plan: Revert the merge commit for CR 115 to restore previous cr show behavior.
