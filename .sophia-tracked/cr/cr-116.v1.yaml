cr:
    id: 116
    uid: cr_cd7604ce-7480-4936-9f69-c7b2fb8236d9
    title: Always-live SSE updates for cr show preview
    description: Make localhost cr show preview auto-refresh without manual reload by streaming full snapshot payloads over SSE.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: b3a09b7cca36f345506706598c23ff78c1a8482e
    branch: cr-always-live-sse-updates-for-cr-show-preview-cd76
    merged_at: "2026-03-03T00:21:13Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: The current cr show page renders from a one-time payload and requires manual reload. This change makes preview pages self-updating while preserving read-only semantics and keeping all updates local to the ephemeral localhost server.
    scope:
        - internal/cli/cr_cmd_show.go
        - internal/cli/cr_show_test.go
        - internal/cli/templates/cr_list.html
        - internal/cli/templates/cr_show.html
    non_goals:
        - No SophiaHQ real-time sync integration.
        - No WebSocket transport.
        - No change to core CR data model or store formats.
    invariants:
        - --json and --no-open behavior remains deterministic.
        - Existing dashboard and per-CR routes continue to render directly via HTTP GET.
        - cr show remains read-only and local-only.
    blast_radius: Changes localhost preview transport and template runtime logic; introduces SSE endpoint and periodic snapshot recomputation with hash-based suppression.
    test_plan: go test ./internal/cli -run TestCRShow -count=1 && go test ./internal/cli -run TestCRListTemplate -count=1 && go test ./internal/cli -run TestCRShowTemplate -count=1
    rollback_plan: Revert the CR merge commit to restore one-shot rendering behavior.
