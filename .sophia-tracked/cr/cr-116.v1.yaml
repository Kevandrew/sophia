      status: done
      contract:
        intent: Expose an SSE endpoint on the ephemeral preview server that streams updates for dashboard or per-CR view.
        acceptance_criteria:
            - Connection exits cleanly on client disconnect or server shutdown.
            - GET /__sophia_events returns text/event-stream with proper no-cache headers.
            - Server writes an initial snapshot event immediately after connect.
