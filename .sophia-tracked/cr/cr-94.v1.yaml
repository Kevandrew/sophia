contract:
    why: The repository skill file needs to reflect current PR-gated behavior so agents do not perform incorrect lifecycle actions. Recent workflow additions introduced draft-first PR publishing, explicit ready transitions, and remote-merge reconciliation needs, but those decision points are not fully documented in the repo-level skill. This change updates the skill guidance to make restart/resume state hydration deterministic and to prevent accidental ready-for-review transitions during pre-implementation publication.
    scope:
        - .sophia-tracked/cr
        - skills/sophia/SKILL.md
    non_goals:
        - Do not change Sophia runtime code or CLI behavior in this CR.
        - Do not modify repository policy defaults in SOPHIA.yaml.
    invariants:
        - PR-gate guidance is draft-first unless reviewer handoff is explicitly requested.
        - Skill guidance remains command-accurate and uses existing Sophia/gh command surfaces only.
    blast_radius: Agent instruction quality for PR lifecycle operations, restart/resume handling, and merge-state reconciliation across Sophia and GitHub.
    risk_tier_hint: low
    risk_rationale: Documentation-only change in skill instructions with no runtime behavior mutation.
    test_plan: sophia cr validate 94 --json && sophia cr review 94 --json
    rollback_plan: Revert the CR-94 merge commit to restore previous skill guidance.
