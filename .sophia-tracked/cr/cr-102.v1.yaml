cr:
    id: 102
    uid: cr_2d2118ce-ac29-455f-9a36-5d65aa78ab04
    title: Normalize add switch state model in AddCROptions
    description: Remove contradictory Switch/NoSwitch option state by normalizing to one internal switch decision at add-entry.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 6d88de135b26da526287274ec43c5b1c0fe13c83
    branch: cr-normalize-add-switch-state-model-in-addcroptions-2d21
    merged_at: "2026-03-04T17:41:27Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: The current add flow represents one switch decision using two booleans (Switch and NoSwitch), which expands state combinations and requires precedence logic. This increases accidental complexity and makes add-related call sites harder to reason about. This CR simplifies that by introducing a single internal switch decision and normalizing legacy fields once at the add boundary while keeping user-visible behavior unchanged.
    scope:
        - internal/cli/cr_cmd_core.go
        - internal/cli/cr_json_branch_ops_test.go
        - internal/cli/json_surface_expansion_test.go
        - internal/service/cr/add.go
        - internal/service/service.go
        - internal/service/service_cr.go
        - internal/service/service_cr_add_switch_test.go
    non_goals:
        - Do not change CLI flags or defaults.
        - Do not redesign non-add command option models.
    invariants:
        - Service-level AddCR convenience behavior remains compatible for existing callers.
        - sophia cr add default remains no-switch unless --switch is provided.
    blast_radius: Add options parsing/normalization path, switch decision plumbing, and add-related tests touching switch semantics.
    risk_tier_hint: medium
    risk_rationale: Touches a core CR intake path and default behavior interpretation.
    test_plan: go test ./internal/service ./internal/cli
    rollback_plan: Revert the merge commit for this CR to restore prior add option semantics.
