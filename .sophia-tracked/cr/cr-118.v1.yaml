            - Closed-unmerged or missing PR does not silently mutate CR to merged/archived.
            - PR status surface distinguishes healthy linked PR vs stale conditions (closed_unmerged, pr_not_found, or linkage mismatch).
            - Status payload includes action_required/action_reason for stale states with deterministic next-step commands.
        scope:
