cr:
    id: 118
    uid: cr_e3583ba4-54a2-4fff-9ffa-aa25afb1d2ef
    title: 'Stale CR lifecycle: reconcile, abandon, and archive workflow'
    description: Define and implement explicit handling for stale PR-linked CRs, including reconcile flows, abandonment semantics, and archive lifecycle signals without silent state mutation.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 17ae5fd3d27af3759986bdba9a75dfa07c82b262
    branch: cr-stale-cr-lifecycle-reconcile-abandon-and-archive-e358
    merged_at: "2026-03-03T02:07:24Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        PR-gated workflows currently represent only in_progress and merged CR lifecycle states. When a linked PR is closed without merge, deleted, or drifts from the expected branch/head context, operators are left with an in_progress CR but no explicit lifecycle guidance. This CR introduces explicit stale/reconciliation and abandonment workflow semantics so operators can deterministically resolve stale CRs without ad-hoc terminal archaeology.

        The outcome is a workflow where stale PR linkage is detectable, actionable, and auditable: status surfaces should indicate stale conditions, reconciliation commands should relink/reopen/create PRs with explicit operator intent, and abandonment should be a first-class lifecycle action with archive-ready event history.

        Success means stale PR-linked CRs are no longer ambiguous: the system provides explicit state signals, recommended next actions, and command paths to reconcile or abandon while preserving merge safety and auditability.
    scope:
        - internal/cli/cr_cmd_archive.go
        - internal/cli/cr_cmd_core.go
        - internal/cli/cr_cmd_pr.go
        - internal/cli/cr_cmd_show.go
        - internal/cli/cr_helpers.go
        - internal/cli/cr_json_mappers.go
        - internal/cli/cr_json_pr_gate_test.go
        - internal/cli/cr_show_test.go
        - internal/model/types.go
        - internal/service/service_archive.go
        - internal/service/service_cr_status.go
        - internal/service/service_delegate_stack.go
        - internal/service/service_pack.go
        - internal/service/service_pr_gate.go
        - internal/service/service_pr_gate_test.go
        - internal/service/service_review_merge.go
        - internal/service/service_review_merge_test.go
    non_goals:
        - No automatic merge, close, or archive mutation triggered solely by background status checks.
        - No network/provider expansion beyond current GitHub-backed PR workflow.
        - No replacement of existing PR-gate policy requirements (approvals/checks/draft gates).
    invariants:
        - CR merge remains an explicit operator action.
        - Existing in_progress/merged merge semantics remain backward compatible for non-stale CRs.
        - Stale detection and reconcile/abandon transitions are evented and auditable.
    blast_radius: Touches PR status/reconcile logic, CLI status and command UX, CR lifecycle metadata, and archive/read-model reporting; failures could misclassify stale state or block merge paths if not guarded.
    test_plan: go test ./internal/service -run PR -count=1 && go test ./internal/cli -run TestCRPR -count=1 && go test ./internal/cli -run TestCRStatus -count=1 && go test ./... && go vet ./...
    rollback_plan: Revert the CR merge commit to restore previous PR-gate lifecycle behavior.
