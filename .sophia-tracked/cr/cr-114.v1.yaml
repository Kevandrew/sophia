    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: Reviewers and demo audiences need a human-friendly CR view they can open instantly from the CLI without parsing dense terminal output. Add a read-only `sophia cr show` command that resolves the selected/current CR, renders key CR context (intent, contract, tasks, validation, trust, evidence, and timeline), and opens a local browser tab for fast review.
    scope:
        - docs
        - internal/cli
    non_goals:
        - No in-browser editing or write-back of CR metadata.
        - No remote server dependency; output must stay local and read-only.
    invariants:
        - Command remains read-only and must not mutate CR/store state.
        - Generated page is a single self-contained .html file (HTML+CSS+JS).
    blast_radius: CLI navigation surface plus local viewer output for CR context rendering.
    risk_tier_hint: medium
    risk_rationale: Adds a new operator-facing command with browser-launch behavior across platforms.
    test_plan: go test ./... && go vet ./...
    rollback_plan: Revert the CR merge commit.
