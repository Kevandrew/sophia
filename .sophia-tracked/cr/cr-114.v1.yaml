    title: Add read-only CR show browser view
    description: Provide a read-only command that renders the selected/current CR as a human-friendly single-file HTML page and opens it in a browser for demo/review workflows.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 24b3f037f5e5c11cddd3b49226296f8a77d2ec71
