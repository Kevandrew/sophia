cr:
    id: 148
    uid: cr_8e580071-e2d8-48f6-9d80-5e6ea7938038
    title: Cache cr show metadata and build dashboard snapshots from a shared read model
    description: Make `sophia cr show` fast by eliminating repeated full-CR YAML scans during dashboard and stack rendering. Add a repo-local cached CR metadata/index path that loads CR YAML once per process refresh, derives stack data from shared preloaded state, and gives the dashboard/SSE path a snappy read model instead of rebuilding from disk on every helper call.
    status: merged
    base_branch: main
    base_ref: cr-refactor-cr-show-preview-launch-into-an-explicit-6ed2
    base_commit: 1a7bcb74a3d5c2c75e9b11c943747af06dfe42a4
    branch: cr-cache-cr-show-metadata-and-build-dashboard-snaps-8e58
    merged_at: "2026-03-06T03:29:18Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: Make dashboard-mode `sophia cr show` fast enough to feel like a local control plane instead of a report generator. Today the command repeatedly scans every CR YAML file, decodes all CRs multiple times per request, and then recomputes stack nativity/lineage/tree data inside per-row helpers. That turns a simple localhost preview into repeated full-repo metadata reads and accidental O(n²) behavior as the CR count grows. This CR introduces a repo-local cached metadata/read-model path so CR metadata is loaded once, reused across dashboard and per-CR snapshot builders, and incrementally refreshable within the process lifecycle. The result should be a much snappier dashboard, cheaper SSE refreshes, and a foundation for later disk-backed or watcher-driven invalidation without changing CR YAML as the source of truth.
    scope:
        - internal/cli
        - internal/service
        - internal/store
    non_goals:
        - No change to CR YAML schema or metadata source of truth.
        - No full frontend rewrite in this CR.
    invariants:
        - CR YAML files remain the source of truth; cache state must be derived and refreshable.
        - Dashboard and stack read models must be built from shared preloaded CR state, not repeated store scans.
        - SSE and snapshot payload semantics remain compatible with the current UI.
    blast_radius: Touches store/service read paths used by cr show, stack nativity/read-model helpers, dashboard snapshot construction, and any code paths that rely on ListCRs during preview generation. Failure modes include stale snapshot data, incorrect stack lineage/tree derivation, or cache invalidation bugs causing missing CR updates.
    risk_tier_hint: medium
    risk_rationale: The cache is internal-only and repo-local, but it changes the read path for a primary CLI/UI surface and must not serve stale or incorrect CR graph data.
    test_plan: go test ./internal/service ./internal/cli && go test ./... && manually compare `sophia cr show --json --no-open` and `sophia cr show <id> --json --no-open` before/after for output compatibility and latency.
    rollback_plan: Revert the CR to restore direct uncached metadata reads and live dashboard derivation.
