contract:
    why: Define the internal delegation runtime boundary Sophia will use for any future worker backend, and ship a deterministic mock implementation so the control plane can be developed and tested without Codex, Pi, or OpenCode. This child decides the contract shape, not the first production adapter.
    scope:
        - internal/service
    non_goals:
        - No browser launch UI in this child CR.
        - No real external worker process or app-server integration.
    invariants:
        - Normalized events are sufficient for UI rendering without backend-native payload inspection.
        - The runtime contract is not overfit to one provider.
    blast_radius: Touches service orchestration and test harnesses for delegation execution. Failure modes are overfitting the interface to one backend, incomplete progress semantics, or a mock that cannot exercise real UI state transitions.
    risk_tier_hint: medium
    risk_rationale: Defines the adapter seam every future backend must implement.
    test_plan: go test ./internal/service
    rollback_plan: Revert this child CR merge commit and remove the runtime contract and mock worker introduced here.
