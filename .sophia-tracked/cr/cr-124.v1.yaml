    title: 'Checkpoint commits: remove silent commit-type fallback to chore'
    description: Prevent silent intent collapse in task checkpoint commit types by requiring explicitness or emitting explicit operator-visible warnings.
    status: merged
    base_branch: main
    base_ref: cr-eliminate-silent-fallback-semantics-in-repair-an-e345
    base_commit: dbdc6181be0170c6c34324eb327fee97b4e8d642
    branch: cr-checkpoint-commits-remove-silent-commit-type-fal-f154
