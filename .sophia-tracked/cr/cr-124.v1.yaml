    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: Task checkpoint commits should preserve intent signal and should not silently downgrade to chore when commit type is omitted or cannot be inferred. This CR introduces explicitness in commit type resolution so commit history semantics remain trustworthy for review, automation, and audit consumers. The result should preserve deterministic message formatting while making fallback behavior visible or policy-enforced.
    scope:
        - internal/cli
        - internal/service
        - internal/service/service_messages.go
    non_goals:
        - No changes to repair timestamp behavior.
        - No expansion of allowed commit-type taxonomy beyond current supported set.
        - No unrelated formatting refactors in checkpoint message generation.
    invariants:
        - Any inferred or defaulted commit type must be explicit and review-visible.
        - Checkpoint message schema and metadata footers remain parseable by existing tooling.
        - Explicit commit-type override continues to be authoritative.
    blast_radius: Affects task checkpoint message generation, task-done command behavior around commit-type resolution, and review/audit interpretation of checkpoint commit intent.
    risk_tier_hint: medium
    risk_rationale: Touches commit intent labels that influence review quality and workflow trust.
    test_plan: go test ./... && go vet ./...
    rollback_plan: Revert this child CR merge commit.
