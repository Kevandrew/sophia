cr:
    id: 150
    uid: cr_8a087f9c-0ab3-46e1-8001-0e2457e66ca3
    title: Split Heavy Integration Tests Out Of Default Lane
    description: Reduce day-to-day development friction by removing long-running integration-heavy test files from the default package test path while preserving explicit coverage in a separate integration lane. The first wave covers PR-gate, CR show SSE, HQ, worktree, and archive suites; the second wave includes collab and task checkpoint suites so routine local validation no longer drags in multi-minute package runs for ordinary edits.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: a7799c4c363836ecb9a8ae2a691a17106e241721
    branch: cr-split-heavy-integration-tests-out-of-default-lan-8a08
    merged_at: "2026-03-06T08:47:32Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        Restore a fast default development loop by separating long-running integration-style test suites from the package test commands engineers use for routine local validation. The goal is to keep the default lane focused on fast feedback while preserving explicit coverage for real repo, remote, PR-gate, SSE, HQ, archive, collab, and checkpoint workflows in a dedicated integration lane.

        This CR covers the repo-level test-lane split, the mechanics for explicitly running the moved suites, and the second-wave files that are currently large enough to continue causing workflow drag even after the first wave is removed. Success means an engineer can make normal changes in the Sophia repo and run the default test path without automatically paying the cost of these integration-heavy suites.
    scope:
        - .github
        - CONTRIBUTING.md
        - README.md
        - docs
        - internal/cli
        - internal/service
        - scripts
    non_goals:
        - Do not change production semantics of PR-gate, SSE, or service orchestration beyond test-lane plumbing.
        - Do not reduce behavioral coverage for PR-gate, HQ, worktree, archive, collab, or task checkpoint flows.
        - Do not rewrite all heavy tests around mocks in this CR.
    invariants:
        - Default package test commands stop executing the moved files unless integration mode is requested.
        - Fast-lane coverage still validates command wiring, JSON surfaces, and core service logic.
        - The moved suites remain runnable through an explicit documented integration command.
    blast_radius: Affects Go test discovery for internal/cli and internal/service, local developer test commands, CI lane definitions, and documentation for how to run integration coverage explicitly. Main failure modes are accidentally dropping coverage, making the integration lane hard to invoke, or mis-tagging files so default and integration paths diverge unexpectedly.
    risk_critical_scopes:
        - internal/cli
        - internal/service
    risk_tier_hint: medium
    risk_rationale: Touches repository test execution semantics and CI/developer workflows across the two slowest packages.
    test_plan: go test ./... ; ./scripts/test-integration.sh ; go vet ./...
    rollback_plan: Revert the CR merge commit to restore the previous default test inclusion behavior.
