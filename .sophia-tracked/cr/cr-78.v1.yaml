    title: Fix SOPHIA_OUTPUT=json for cr subcommands
    description: Ensure automatic JSON mode applies under cr PersistentPreRunE and add regression coverage
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 9fc814da13a98451bba4e0289a8d8fb0d2b31442
