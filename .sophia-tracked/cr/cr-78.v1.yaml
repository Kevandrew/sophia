    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: CR-75 introduced SOPHIA_OUTPUT-based automatic JSON mode in the root pre-run. The CR command has its own PersistentPreRunE and did not chain that auto-JSON hook, so `SOPHIA_OUTPUT=json sophia cr list` produced text output in TTY sessions. This change applies automatic JSON selection in the CR pre-run path before selector rewriting, restoring consistent behavior for CR subcommands while preserving existing selector semantics.
    scope:
        - internal/cli/cr.go
        - internal/cli/output_mode_test.go
    non_goals:
        - Change JSON envelope schema or command payload fields.
        - Change default text output when SOPHIA_OUTPUT is unset and stdout is a TTY.
    invariants:
        - CR selector rewrite behavior remains unchanged for CR subcommands.
        - Explicit --json=false must force text output even when SOPHIA_OUTPUT=json is set.
    blast_radius: Limited to CLI output mode activation for `sophia cr ...` subcommands that already support `--json`; no changes to service logic, persistence, or JSON payload schemas.
    risk_critical_scopes:
        - internal/cli
    risk_tier_hint: low
    risk_rationale: Small CLI wiring change in pre-run hook plus regression coverage; no data model or merge-flow changes.
    test_plan: go test ./internal/cli -run TestOutputModeSOPHIAOutputJSONAppliesToCRSubcommands; go test ./...; go vet ./...; SOPHIA_OUTPUT=json sophia cr list (TTY smoke test).
    rollback_plan: Revert task checkpoint commit 8b444c03 on CR-78 and rebuild the sophia binary.
