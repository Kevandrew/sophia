    uid: cr_46759a04-847b-42af-b72b-594419899135
    title: Promote internal/service sub-packages to true domain owners
    description: Turn thin helper sub-packages into real ownership boundaries by moving domain logic out of top-level service_* files into cr/tasks/trust/policy/merge/diff/collab packages.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 785073f573b902f8baadb0e17c21fd03bc79cb1e
    branch: cr-promote-internal-service-sub-packages-to-true-do-4675
    merged_at: "2026-02-27T11:43:59Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        The repo already has sub-packages under internal/service, but many are currently helper-only and do not own the corresponding domain logic.

        This CR completes the decomposition so package names match ownership reality, improving discoverability and reducing the cognitive mismatch between directory structure and behavior location.

        Success means most domain-specific logic resides in domain packages, while root-level service files focus on orchestration and compatibility boundaries.
    scope:
        - internal/service/collab
        - internal/service/cr
        - internal/service/diff
        - internal/service/merge
        - internal/service/policy
        - internal/service/service_collab.go
        - internal/service/service_cr.go
        - internal/service/service_diff.go
        - internal/service/service_tasks.go
        - internal/service/tasks
        - internal/service/trust
    non_goals:
        - Do not alter persisted metadata formats or checkpoint footer semantics.
        - Do not change command-level UX in this decomposition step.
        - Do not replatform package architecture outside internal/service.
    invariants:
        - Domain behavior remains deterministic and test-equivalent after ownership moves.
        - Package APIs are explicit and avoid hidden bidirectional coupling.
        - Root Service remains a composition/orchestration boundary.
    blast_radius: Affects package boundaries, imports, and internal call graphs across service domains; main risks are import cycles and accidental behavior drift during ownership moves.
    risk_critical_scopes:
        - internal/service
    risk_tier_hint: high
    risk_rationale: Wide import-graph and ownership movement across several active domains.
    test_plan: go test ./internal/service/... ./internal/cli/... && go test ./... && go vet ./...
    rollback_plan: Revert the CR merge commit if package ownership moves introduce cycles or behavior regressions.
