    title: Graceful metadata-only preview for missing CR branch
    description: Allow cr show/pack to render deterministic metadata-only previews when an in-progress CR branch anchor is missing, while preserving strict validation and merge safety signals.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 4a2e33025ad495e7825e0335c55b184406fda545
    branch: cr-graceful-metadata-only-preview-for-missing-cr-br-ec54
    merged_at: "2026-03-03T03:14:53Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: 'Restore read-only CR visibility when branch anchors are missing so operators can inspect intent metadata and next actions without hard failures. Keep behavior deterministic: preview surfaces may degrade to metadata-only anchors, but merge and validation safety signals must remain strict and explicit about missing branch context. Done means cr show/pack succeeds for missing-branch in-progress CRs with clear warnings and actionable remediation.'
    scope:
        - docs/cli-reference.md
        - internal/cli/cr_cmd_show.go
        - internal/cli/cr_show_test.go
        - internal/cli/templates/cr_show.html
        - internal/service/service_cr_refs.go
        - internal/service/service_cr_refs_test.go
        - internal/service/service_pack.go
        - internal/service/service_pack_test.go
    non_goals:
        - No automatic branch recreation in read-only commands.
        - No behavior change for task checkpoint or merge mutation flows.
        - No relaxation of merge/validation blockers for missing branch context.
    invariants:
        - Anchor fallback is deterministic and surfaces explicit warnings in payload/UI.
        - Merge readiness remains blocked when branch diff context is unavailable.
        - Missing-branch preview mode never mutates refs, branches, or checkpoint metadata.
    blast_radius: CR anchor resolution for pack/show, JSON payload warnings, show template warning rendering, and tests for missing-branch in-progress CR behavior.
    risk_tier_hint: medium
    risk_rationale: Touches CR preview and anchor resolution paths that can affect operator visibility and trust signals.
    test_plan: go test ./internal/service -run 'CRRef|Pack|Imported|MetadataOnly' -count=1 && go test ./internal/cli -run 'CRShow' -count=1 && go test ./... -count=1 && go vet ./...
    rollback_plan: Revert the [CR-119] merge commit to restore strict head-anchor requirements for show/pack.
