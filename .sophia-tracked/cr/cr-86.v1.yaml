cr:
    id: 86
    uid: cr_6d4a4f08-aa74-458f-b856-bef63ef74c8d
    title: Freeze CR scope baseline on first checkpoint
    description: Prevent silent CR scope drift by freezing baseline scope at first task checkpoint, recording post-freeze scope edits as explicit CR contract drift, and gating merge on unresolved drift records.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 03696edd91c2b06bde3ced32024c33867ff0fe57
    branch: cr-freeze-cr-scope-baseline-on-first-checkpoint-6d4a
    merged_at: "2026-02-28T11:53:30Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        Sophia currently computes scope drift from the mutable current CR scope. This allows an agent to remove drift by widening scope after implementation starts, which weakens review integrity in agent-first workflows.

        This change introduces an auditable decision boundary: once the first checkpoint commit is made, CR scope is frozen as baseline for drift evaluation. Post-freeze scope changes remain possible, but only through explicit, reasoned revision flow with recorded drift and acknowledgement.

        Success criteria: drift cannot be silently neutralized by editing scope after checkpoint; reviewers can inspect and acknowledge CR-level drift; merge gate blocks unresolved drift without emergency override.
    scope:
        - internal/cli
        - internal/model
        - internal/service
    non_goals:
        - Do not change task-level drift semantics.
        - Do not force validate --record as mandatory for all merges.
        - Do not freeze non-scope contract fields in this iteration.
    invariants:
        - Existing override/merge policy behavior remains intact except for new CR-drift blocker.
        - First checkpoint deterministically captures CR scope baseline once.
        - Post-freeze scope edits are explicit and auditable, never silent.
        - Pre-checkpoint CR authoring remains fully editable.
    blast_radius: 'CLI: cr contract set + new contract drift commands; Data: CR YAML adds contract baseline/drift metadata + events; Validation: drift source changes to baseline when frozen; Trust/Merge: new CR-drift requirement and blocker path; Failure modes: missing reason on frozen scope edit, stale unresolved drift preventing merge.'
    risk_critical_scopes:
        - internal/service
    risk_tier_hint: medium
    risk_rationale: Touches validation and merge gating behavior for all CRs.
    test_plan: go test ./... && go vet ./...
    rollback_plan: Revert the CR merge commit to restore mutable-scope validation behavior.
