    title: Eliminate silent fallback semantics in repair and checkpoint intent
    description: Track and remove high-suspicion silent fallbacks that can degrade chronology or intent metadata without explicit operator signal.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: dbdc6181be0170c6c34324eb327fee97b4e8d642
