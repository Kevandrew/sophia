    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: Eliminate two silent fallback paths that can change semantic meaning without a visible operator signal. Specifically, prevent repair from fabricating historical timestamps and prevent task checkpoint commit type from quietly collapsing to chore when no explicit type is provided. The outcome is stronger trust in chronology and intent metadata while retaining deterministic, operator-friendly workflows.
    scope:
        - internal/cli
        - internal/service
        - internal/service/service_maintenance.go
        - internal/service/service_messages.go
    non_goals:
        - No behavioral changes to unrelated fallback paths (anchors, diff chunk mapping, or UI date sorting sentinels) in this CR.
        - No broad refactor of service package structure.
        - No merge-mode changes; PR-gate workflow semantics remain intact.
    invariants:
        - Any degraded or inferred state must be surfaced explicitly to operators.
        - Checkpoint commit messages remain deterministic and parseable by current tooling.
        - Repair remains non-destructive and deterministic for existing metadata.
    blast_radius: Affects repair metadata reconstruction and task checkpoint commit message classification. Surfaces include repair outputs, CR chronology ordering inputs, task checkpoint footers/subjects, and validation/review trust context for commit intent labels.
    risk_tier_hint: medium
    risk_rationale: Changes touch metadata chronology and commit intent semantics used across review and audit surfaces.
    test_plan: go test ./... && go vet ./...
    rollback_plan: Revert the merge commits for child CRs and parent CR in stack order.
