    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: The CLI currently duplicates most add command flow between root add and child add. This increases maintenance cost and creates drift risk for behavior, errors, and JSON output. This CR introduces a shared add command execution path with mode-specific parent resolution while preserving command UX and output contracts.
    scope:
        - internal/cli/cr_cmd_core.go
        - internal/cli/cr_json_branch_ops_test.go
        - internal/cli/cr_json_delegate_stack_test.go
        - internal/cli/json_surface_expansion_test.go
    non_goals:
        - Do not alter service-level add behavior.
        - Do not change user-facing command names or flag sets.
    invariants:
        - child add still errors with actionable guidance when no active CR context exists.
        - cr add and cr child add keep existing text/JSON behavior.
    blast_radius: CLI add command constructors, parent context resolution path, and JSON/text render expectations.
    risk_tier_hint: medium
    risk_rationale: Touches command wiring and user-facing add intake paths.
    test_plan: go test ./internal/cli ./internal/service
    rollback_plan: Revert the merge commit for this CR to restore duplicated command handlers.
