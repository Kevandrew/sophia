    title: Unify CLI cr add and child add wiring
    description: Replace duplicated command execution paths for cr add and cr child add with one shared add command engine.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 279650bc787fac6d35416e05b6e705384cb5241e
    branch: cr-unify-cli-cr-add-and-child-add-wiring-aa52
