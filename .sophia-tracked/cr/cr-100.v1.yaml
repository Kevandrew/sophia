    uid: cr_85ec900a-f148-4e90-988c-000677f43d92
    title: Add Sophia auto-update workflow
    description: Implement a first-class auto-update command/workflow so users can update Sophia from installed binaries without manual reinstall steps.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 1019739b30d74f7de20b9e8b8c19aa24f46ab88e
    branch: cr-add-sophia-auto-update-workflow-85ec
    merged_at: "2026-03-01T15:56:23Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: Sophia currently relies on manual reinstall steps after each release, which is slow and error-prone in active development and user onboarding. Add an explicit auto-update workflow so installed binaries can self-update safely and predictably from official release artifacts. Success means a user can run a single command to discover and apply updates with clear rollback/error behavior and no surprise side effects.
    scope:
        - docs
        - internal/cli
        - internal/service
    non_goals:
        - Do not change core CR/task workflow behavior.
        - Do not introduce mandatory background auto-updates.
    invariants:
        - Update flow is explicit and user-triggered.
        - Version command remains truthful before and after update.
    blast_radius: CLI command surface, release artifact resolution, installer/update execution paths, and user-facing docs.
    risk_tier_hint: medium
    risk_rationale: Touches binary replacement path and user environment behavior.
    test_plan: go test ./internal/cli ./internal/service && go test ./...
    rollback_plan: Revert CR merge commit and fall back to documented manual install flow.
