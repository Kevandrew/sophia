        - internal/cli
        - internal/model
        - internal/service
    non_goals:
        - Change merge gating semantics
        - Remove scope discipline or drift auditing entirely
    invariants:
        - Scope changes remain auditable and explicit.
        - Validation output stays deterministic and machine-readable.
    blast_radius: Contract baseline capture timing, drift recording rules, and PR-facing drift context output.
    risk_tier_hint: medium
