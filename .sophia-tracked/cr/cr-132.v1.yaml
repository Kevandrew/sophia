contract:
    why: Add operator-facing read surfaces and explicit reconciliation semantics for delegation outcomes so Sophia can record what happened without silently changing CR or task state. This child defines the v1 handoff contract from a run back into Sophia.
    scope:
        - internal/cli
        - internal/model
        - internal/service
    non_goals:
        - No automatic task completion or merge advancement in response to a run.
        - No production worker adapter work.
    invariants:
        - Task completion remains an explicit Sophia action.
        - Terminal results are auditable from both CLI and CR history.
    blast_radius: Touches CLI read surfaces, persisted terminal summaries, and CR evidence/event reconciliation. Failure modes are ambiguous terminal summaries, missing operator inspection paths, or accidental auto-completion of delegated tasks.
    risk_tier_hint: medium
    risk_rationale: Defines how delegation results are inspected and recorded back into Sophia.
    test_plan: go test ./internal/cli ./internal/service ./internal/model
    rollback_plan: Revert this child CR merge commit and remove delegation inspection and reconciliation surfaces introduced here.
