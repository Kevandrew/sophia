cr:
    id: 79
    uid: cr_17d1bec7-fa41-478d-8c78-fe9e11872270
    title: Extract trust evaluation into a dedicated domain service
    description: Break trust evaluation and trust-check orchestration out of the monolithic Service type while preserving existing CLI behavior, JSON shapes, and trust verdict semantics.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 497bfb2be4a27285b131a0497cc56bd64376ba54
    branch: cr-extract-trust-evaluation-into-a-dedicated-domain-17d1
    merged_at: "2026-02-27T06:06:55Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        Trust logic currently lives across large methods on the root Service type, which makes review and maintenance difficult and keeps critical risk logic coupled to unrelated workflows.

        This CR isolates trust evaluation and trust-check orchestration behind a focused domain service so trust behavior is discoverable, testable, and evolvable without expanding the global Service method set.

        Success means trust status, review, and check flows remain behaviorally equivalent for unchanged repo state while ownership moves to a dedicated domain unit.
    scope:
        - internal/cli/cr_cmd_check.go
        - internal/cli/cr_cmd_review_merge.go
        - internal/cli/cr_json_mappers.go
        - internal/cli/cr_json_trust_test.go
        - internal/service/service.go
        - internal/service/service_checks.go
        - internal/service/service_checks_test.go
        - internal/service/service_hq_status.go
        - internal/service/service_integrity_test.go
        - internal/service/service_review_merge.go
        - internal/service/service_trust.go
        - internal/service/service_trust_domain.go
        - internal/service/service_trust_test.go
        - internal/service/service_trust_types.go
        - internal/service/trust
    non_goals:
        - Do not change CLI command names, flags, or top-level workflows.
        - Do not change trust thresholds or policy defaults in SOPHIA.yaml.
        - Do not introduce metadata schema changes for CR/task YAML.
    invariants:
        - JSON payload fields and error codes for trust/check surfaces remain backward compatible.
        - Mutation lock guarantees are preserved for all trust-adjacent workflows.
        - Trust verdicts and required/attention actions remain deterministic for unchanged repo state.
    blast_radius: Affects trust-related service orchestration and CLI read surfaces (review/check/status), plus mapper paths that serialize trust output. Primary failure modes are trust verdict drift or JSON contract drift.
    risk_critical_scopes:
        - internal/cli
        - internal/service
    risk_tier_hint: high
    risk_rationale: Touches readiness and trust decision surfaces used before merge.
    test_plan: go test ./internal/service/... ./internal/cli/... && go test ./... && go vet ./...
    rollback_plan: Revert the CR merge commit and rerun go test ./... to confirm trust outputs return to baseline.
