    uid: cr_b9c9d01a-1c0d-427d-84ed-85a3cec07c62
    title: Tracked CR archive artifacts on merge (append-only YAML)
    description: |-
        Add a Git-backed, append-only CR archive so merged CR intent/contract/tasks are historically reconstructible from Git alone.

        Unmerged CRs remain ephemeral (branches + local metadata and optional collaboration remotes). Merged CRs get an immutable snapshot committed to main.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 78e00a9b88a8830bc93b25ba40a8da60a5a6f492
    branch: cr-58-tracked-cr-archive-artifacts-on-merge-append-onl
    merged_at: "2026-02-24T21:28:26Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        CR contract details that exist only in local (gitignored) metadata can be lost. Git can only reconstruct what was written into Git history.

        This change makes merged CRs durable by writing a canonical, deterministic YAML snapshot into the merge commit itself. The archive is intended for historical lookback and backup: a stable, machine-readable record of what was merged and why.
    scope:
        - .gitattributes
        - SOPHIA.yaml
        - docs
        - internal/cli
        - internal/gitx
        - internal/model
        - internal/service
        - skills/sophia
    non_goals:
        - No UI changes; this only adds a durable, machine-readable archive record.
        - No changes to collaboration remotes or sync behavior.
        - No full patch diffs stored in the archive; only file list + diffstat + commit hashes.
        - No rewriting existing archive records; corrections are new revisions only.
    invariants:
        - 'Archive records are append-only: write cr-<id>.vN.yaml, never overwrite prior versions.'
        - If merge conflicts occur, do not write/archive until conflicts are resolved and merge resumes.
        - 'Merge commit remains atomic: code + archive land together when merge succeeds.'
        - Writing archives must not require the CR branch to exist (works after branch deletion).
    blast_radius: Merge path (merge/resume), CR archive surfaces, and repository policy parsing. Adds tracked archive files under .sophia-tracked/.
    test_plan: go test ./... && go vet ./...
    rollback_plan: Revert archive generation + CLI commands. Existing CR workflow remains intact; archives are additive only.
