contract:
    why: The UI should not reconstruct aggregate-parent hierarchy from loosely related fields at render time. This child introduces an explicit read-model shape for threaded stacks so both `cr show` and `cr list` can render the same structure consistently.
    scope:
        - internal/cli
        - internal/service
    non_goals:
        - No HTML redesign in this child CR.
        - No change to merge or delegation semantics.
    invariants:
        - Normal CR payloads remain lightweight and compatible.
        - Read models remain derived from existing CR and delegation metadata rather than introducing duplicate sources of truth.
    blast_radius: Touches stack-aware service packing and JSON mappers. Failure modes are incorrect lineage ordering, duplicate child nodes, or mismatched stack-role labels.
    risk_tier_hint: medium
    risk_rationale: Defines the data contract every stack-aware surface will consume.
    test_plan: go test ./internal/service ./internal/cli
    rollback_plan: Revert this child CR and remove threaded-tree-specific read-model fields.
