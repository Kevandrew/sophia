    title: Add merge mode for CR bundle import
    description: Extend CR bundle import from create|replace to include merge semantics with deterministic conflict reporting and a preview surface, reducing all-or-nothing replacement behavior for collaboration sync.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 7b25c08ee03322677443d8d045ade033f8898709
    branch: cr-add-merge-mode-for-cr-bundle-import-ae13
    merged_at: "2026-03-03T11:53:48Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: Add merge import mode so shared CR bundles can be reconciled safely without choosing only create or full replace. Done means field and task reconciliation is deterministic, conflicts are explicit, and users can preview merge outcomes before mutation.
    scope:
        - docs/cli-reference.md
        - docs/collaboration.md
        - internal/cli/cr_cmd_import_patch.go
        - internal/cli/cr_json_collab_test.go
        - internal/cli/json.go
        - internal/model
        - internal/service/service_collab.go
        - internal/service/service_collab_test.go
        - internal/service/service_import_helpers.go
    non_goals:
        - No changes to Git branch or checkpoint commits during import merge.
        - No implicit force overwrite when conflicts exist.
        - No schema-breaking changes for existing create and replace paths.
        - No server side merge coordination in this CR.
    invariants:
        - Create and replace modes retain existing behavior.
        - Import merge never silently drops existing local task or contract data.
        - Merge mode reports deterministic conflict structures for identical inputs.
        - Preview and apply share the same merge classification logic.
    blast_radius: CR bundle import mode semantics, conflict/result payload shape, CLI import contract, and collaboration docs. Failure modes include silent overwrites, unstable conflict classification, and inconsistent preview/apply outcomes.
    risk_critical_scopes:
        - internal/service/service_collab.go
    risk_tier_hint: high
    risk_rationale: Import paths mutate canonical CR metadata, so merge-rule mistakes can corrupt intent history across collaboration workflows.
    test_plan: go test ./internal/service -run 'Import|Bundle|Collab' -count=1 && go test ./internal/cli -run 'Import|Collab' -count=1 && go test ./... -count=1 && go vet ./...
    rollback_plan: Revert the [CR-109] merge commit and restore import behavior to create|replace only.
