    title: Delegated execution from cr show via a runtime-agnostic Sophia control plane
    description: Create the Sophia-side delegation control plane for cr show with a backend-agnostic runtime contract, live run visibility, and explicit reconciliation semantics.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: d2d42a367e14440422e045acacfe071a0b6c6868
    branch: cr-delegated-execution-from-cr-show-via-a-runtime-a-3c34
    merged_at: "2026-03-05T22:11:46Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        Enable Sophia to launch and track delegated work directly from `sophia cr show` without coupling the product surface to any one agent runtime. The immediate outcome is a real Sophia-owned control plane for delegation: users can start a run from the CR preview, observe what the worker is doing, inspect how it ended, and keep CR intent as the source of truth.
        This stack is intentionally infrastructure-first. It does not lock the implementation to Codex, Pi, or OpenCode, and it does not require a production worker integration in the first milestone. Instead, it establishes the runtime-neutral request, event, and result contracts that future adapters must fit.
    scope:
        - internal/cli
        - internal/model
        - internal/service
        - internal/store
    non_goals:
        - No automatic task completion from delegated runs in v1.
        - No dashboard-wide delegation UI beyond shared read-model support.
        - No production Codex, Pi, or OpenCode adapter in this stack.
    invariants:
        - Delegation metadata stays runtime-agnostic and does not embed provider-native wire shapes.
        - Existing child-CR delegation semantics continue to work unchanged.
        - Sophia remains the source of truth for CR intent, task state, and merge decisions.
    blast_radius: Touches CR/task metadata and local persistence for delegation runs, `cr show` localhost preview routes and payloads, read-only/live HTML rendering, and new CLI read surfaces for delegation status. Failure modes include stale or partial live status, ambiguous run state transitions, and accidental over-coupling to a single runtime.
    risk_critical_scopes:
        - internal/cli
        - internal/service
    risk_tier_hint: medium
    risk_rationale: Touches CR metadata, live localhost preview behavior, and new orchestration state surfaces.
    test_plan: go test ./internal/model ./internal/store ./internal/service ./internal/cli && go test ./...
    rollback_plan: Revert the delegation-control-plane stack and remove persisted delegation-run fields and read surfaces introduced by this stack.
