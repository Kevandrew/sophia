cr:
    id: 87
    uid: cr_b0ade802-e333-4847-a828-e3d528b1da19
    title: Slim PR body and batch checkpoint comments
    description: The PR body renderer dumps too much detail (full acceptance criteria in task table, file breakdown inline, empty sections) and checkpoint sync posts one comment per task instead of batching. This makes generated PRs noisy and hard to scan. Slim the managed block and make checkpoint comments incremental.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 6b21a9e1b53114a6c929c536f328ee30f2db92ba
    branch: cr-slim-pr-body-and-batch-checkpoint-comments-b0ad
    merged_at: "2026-02-28T17:38:28Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        PR #1 on kevandrew/sophia showed two problems with the current PR-gate renderer:

        1. The managed PR body is too dense. It inlines full acceptance criteria per task (multi-line cells with <br> separators), renders empty sections like 'Task Contract Drifts: (none)' and 'Evidence: (none)', and dumps the full file breakdown table inline. A 10-task CR produces a wall of text that defeats the purpose of structured review.

        2. Checkpoint comments are spammed one-per-task on every sync. When all tasks are already done at PR open time, the first sync dumps 10+ individual one-liner comments simultaneously. These carry no incremental signal and drown out actual reviewer discussion.

        Success criteria: a 10-task CR with no drift and no evidence produces a PR body that fits comfortably on one screen, and checkpoint sync posts at most one batched comment per sync call.
    scope:
        - SOPHIA.yaml
        - internal/service/service_pr_gate.go
        - internal/service/service_pr_gate_test.go
    non_goals:
        - No changes to CR contract fields or task contract data model.
        - No changes to PR gate evaluation, merge finalize, or reconciliation logic.
        - No changes to managed marker format or body patching logic.
    invariants:
        - All contract sections that have data are still rendered; only empty sections are suppressed.
        - Checkpoint comment idempotency is maintained; repeated sync does not duplicate comments.
        - Existing managed markers are preserved; body patching behavior unchanged.
    blast_radius: PR body markdown output changes shape (sections collapsed/removed); checkpoint comment format changes from one-per-task to batched. Existing PRs with old-format managed blocks will get new format on next sync.
    risk_tier_hint: low
    test_plan: go test ./... && go vet ./...
    rollback_plan: Revert the CR merge commit.
