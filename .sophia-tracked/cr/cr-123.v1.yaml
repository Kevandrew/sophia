    title: 'Repair: make missing historical timestamps explicit during metadata recovery'
    description: Replace silent timestamp fabrication during repair with explicit degraded-state signaling so chronology is trustworthy.
    status: merged
    base_branch: main
    base_ref: cr-eliminate-silent-fallback-semantics-in-repair-an-e345
    base_commit: dbdc6181be0170c6c34324eb327fee97b4e8d642
    branch: cr-repair-make-missing-historical-timestamps-explic-6394
    merged_at: "2026-03-05T03:05:56Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: Repair-from-git should preserve chronology semantics and never silently fabricate historical timestamps. When commit time is unavailable or malformed, the degraded state must be represented explicitly so reviewers and operators can distinguish unknown chronology from known chronology. This CR focuses on making timestamp recovery behavior explicit and auditable while preserving deterministic repair execution.
    scope:
        - internal/cli
        - internal/model
        - internal/service
        - internal/service/service_maintenance.go
    non_goals:
        - No broad refactor of CR repair flow beyond timestamp semantics.
        - No changes to checkpoint commit type behavior.
        - No changes to unrelated fallback mechanisms in diff or anchor resolution.
    invariants:
        - Degraded timestamp states must be visible to operators or downstream readers.
        - Historical ordering must not be rewritten silently by now-based fabrication.
        - Repair must continue to process legacy metadata without crashing.
    blast_radius: Affects repair import semantics, CR created/updated/merged timestamp fields, and any review/dashboard ordering that consumes repaired timestamps.
    risk_tier_hint: medium
    risk_rationale: Touches metadata chronology fields that influence review and audit interpretation.
    test_plan: go test ./... && go vet ./...
    rollback_plan: Revert this child CR merge commit.
