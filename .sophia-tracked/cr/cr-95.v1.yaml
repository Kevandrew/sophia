cr:
    id: 95
    uid: cr_b51425df-4737-47f6-83bc-1d7a9d41f22f
    title: Mass-adopt t.Parallel() across the test surface (safe-first)
    description: |-
        Expand top-level test parallelism across Sophia's existing isolated test surface to reduce wall-clock time and increase early detection of hidden shared-state coupling.

        Baseline (2026-03-01): 474 top-level Test* functions, 34 currently using t.Parallel(). This CR targets all eligible tests that do not mutate process-global environment state.

        Safe-first boundary: tests that call t.Setenv/os.Setenv/os.Unsetenv remain serial in this CR and are explicitly documented for follow-up refactors.
    status: merged
    base_branch: main
    base_ref: main
    base_commit: 02f20f6177343fa0d95c237e7a1e51e329fd6c4e
    branch: cr-mass-adopt-t-parallel-across-the-test-surface-sa-b514
    merged_at: "2026-03-01T00:44:30Z"
    merged_by: Kevandrew <143258544+Kevandrew@users.noreply.github.com>
contract:
    why: |-
        The suite already uses per-test temp directories and ephemeral repos in most places, but only a small fraction of tests actually opt into parallel execution. That leaves CI runtime and local feedback loops slower than necessary, and it reduces our ability to expose hidden cross-test coupling early.

        This CR raises adoption of t.Parallel() across the eligible surface while preserving deterministic behavior. The decision boundary is explicit: we parallelize tests that are already process-isolated, and we do not refactor environment-mutating tests in the same change.

        Success means all eligible top-level tests run with t.Parallel(), serial exceptions are explicit and intentional, and the full suite remains green under normal and shuffled execution.
    scope:
        - .github/workflows
        - docs
        - internal/cli
        - internal/cli/cr
        - internal/cli/json
        - internal/gitx
        - internal/service
        - internal/service/policy
        - internal/service/tasks
        - internal/service/trust
        - internal/store
        - scripts
    non_goals:
        - No env-isolation refactor for tests that currently call t.Setenv/os.Setenv/os.Unsetenv.
        - No production CLI/service behavior changes; this CR modifies tests, test tooling, and CI checks only.
        - No retries/flaky-test masking; failures discovered under parallelism must be fixed or left serial with rationale.
    invariants:
        - New t.Parallel() calls occur at top-level Test* entrypoints before shared mutable state is touched.
        - Repository behavior and command outputs remain unchanged outside test execution characteristics.
        - Tests that mutate process-global environment remain serial in this CR.
    blast_radius: |-
        Affects Go test execution characteristics across internal/* packages and CI validation flow.
        Potential failure modes: latent shared-state coupling, ordering assumptions, and file-path collisions becoming visible under parallel execution.
        Detection and recovery: go test failures under standard/shuffle runs, with immediate rollback via merge commit revert.
    risk_critical_scopes:
        - internal/cli
        - internal/service
    risk_tier_hint: medium
    risk_rationale: High test-surface touch count with concurrency-order behavior changes, but limited to test/CI surfaces.
    test_plan: go test ./... && go test ./... -shuffle=on && go test ./... -count=3 && go vet ./...
    rollback_plan: Revert the CR merge commit to restore prior serial test behavior.
