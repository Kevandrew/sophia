contract:
    why: Add validation is currently split across CLI and service, which can allow inconsistent behavior between entrypoints. This CR centralizes semantic validation in service add entrypoints so every caller receives identical validation guarantees and CLI logic remains thin.
    scope:
        - internal/cli/cr_cmd_core.go
        - internal/cli/cr_json_branch_ops_test.go
        - internal/service/cr/add.go
        - internal/service/service_cr.go
        - internal/service/service_cr_add_switch_test.go
    non_goals:
        - Do not introduce new policy requirements unrelated to add semantics.
        - Do not relax existing validation constraints.
    invariants:
        - Add behavior for valid requests is unchanged.
        - Validation errors remain clear and actionable for CLI and non-CLI callers.
    blast_radius: Validation function boundaries, error pathways in add commands, and caller consistency across CLI/service pathways.
    risk_tier_hint: medium
    risk_rationale: Touches error and guardrail behavior in a high-frequency intake command.
    test_plan: go test ./internal/service ./internal/cli
    rollback_plan: Revert the merge commit for this CR to restore split validation behavior.
